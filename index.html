          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { saveAnyway(); setShowCustom(false); setCustomEmo(""); }} style={{ ...bSoft, fontSize: 12, padding: "8px 14px" }}>감정 없이 저장</button>
            <button onClick={cancelPending} style={{ ...bSoft, fontSize: 12, padding: "8px 14px" }}>다시 쓰기</button>
          </div>
        </div>
      )}

      {lastR && !pending && (lastR.analysis.hits.length > 0 || lastR.analysis.matchedPos.length > 0 || lastR.analysis.matchedNeg.length > 0) && (
        <div style={{ ...crd, marginTop: 16 }}>
          <div style={lbl}>최근 분석</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>{lastR.analysis.hits.map((h, i) => <EmoTag key={i} h={h} />)}</div>
          <div style={{ marginTop: 6, fontSize: 11, color: "#475569" }}>긍정 {lastR.analysis.posPct.toFixed(0)}% · 부정 {lastR.analysis.negPct.toFixed(0)}%</div>
          {!showEmoFix && <button onClick={function() { setShowEmoFix(true); }} style={{ ...bSoft, marginTop: 10, fontSize: 11, padding: "6px 12px", color: "#0ea5e9", border: "1px solid #b2ebf2" }}>내 감정은 달라요</button>}
          {showEmoFix && (
            <div style={{ marginTop: 10, padding: 12, background: "#f8fafc", borderRadius: 10, border: "1px solid #e2e8f0" }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: "#0c4a6e", marginBottom: 8 }}>어떤 감정이었나요? (여러 개 선택 가능)</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                {EMOTIONS_28.map(function(emo) {
                  var selected = fixedEmos.includes(emo.name);
                  return <button key={emo.name} onClick={function() {
                    if (selected) setFixedEmos(fixedEmos.filter(function(n) { return n !== emo.name; }));
                    else setFixedEmos([...fixedEmos, emo.name]);
                  }} style={{ padding: "4px 10px", fontSize: 11, borderRadius: 14, cursor: "pointer", border: selected ? "2px solid #0ea5e9" : "1px solid #e2e8f0", background: selected ? "#e0f7fa" : "#fff", color: selected ? "#0c4a6e" : "#475569", fontWeight: selected ? 600 : 400 }}>{emo.label}</button>;
                })}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <button onClick={async function() {
                  if (fixedEmos.length === 0) return;
                  var newHits = fixedEmos.map(function(name) {
                    var emo = EMOTIONS_28.find(function(e) { return e.name === name; });
                    return { name: emo.name, label: emo.label, q: emo.q, val9: emo.val, aro9: emo.aro, valStd: ((emo.val-1)/8)*2-1, aroStd: ((emo.aro-1)/8)*2-1, token: "직접선택", corrected: true };
                  });
                  var updated = entries.map(function(en) {
                    if (en.ts === lastR.ts) {
                      var newA = { ...en.analysis, hits: newHits, corrected: true };
                      return { ...en, analysis: newA };
                    }
                    return en;
                  });
                  setEntries(updated);
                  await save(updated);
                  setLastR({ ...lastR, analysis: { ...lastR.analysis, hits: newHits, corrected: true } });
                  setShowEmoFix(false); setFixedEmos([]);
                  setMsg("✅ 감정이 수정되었습니다.");
                }} style={{ ...bPri, fontSize: 12, padding: "8px 16px" }} disabled={fixedEmos.length === 0}>이 감정으로 수정</button>
                <button onClick={function() { setShowEmoFix(false); setFixedEmos([]); }} style={{ ...bSoft, fontSize: 12, padding: "8px 16px" }}>취소</button>
              </div>
            </div>
          )}
        </div>
      )}
      {lastR && !pending && lastR.analysis.hits.length === 0 && lastR.analysis.matchedPos.length === 0 && lastR.analysis.matchedNeg.length === 0 && (
        <div style={{ ...crd, marginTop: 16 }}>
          <div style={{ fontSize: 12, color: "#475569", marginBottom: 8 }}>감정이 감지되지 않았어요. 직접 선택해볼까요?</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>

                if (selected) setFixedEmos(fixedEmos.filter(function(n) { return n !== emo.name; }));

              }} style={{ padding: "4px 10px", fontSize: 11, borderRadius: 14, cursor: "pointer", border: selected ? "2px solid #0ea5e9" : "1px solid #e2e8f0", background: selected ? "#e0f7fa" : "#fff", color: selected ? "#0c4a6e" : "#475569", fontWeight: selected ? 600 : 400 }}>{emo.label}</button>;
            })}
          </div>
          {fixedEmos.length > 0 && <button onClick={async function() {
            var newHits = fixedEmos.map(function(name) {
              var emo = EMOTIONS_28.find(function(e) { return e.name === name; });

            });
            var updated = entries.map(function(en) {
              if (en.ts === lastR.ts) return { ...en, analysis: { ...en.analysis, hits: newHits, corrected: true } };
              return en;

            setEntries(updated);
            await save(updated);
            setLastR({ ...lastR, analysis: { ...lastR.analysis, hits: newHits, corrected: true } });

  );

/* ContainerScroll 재현: 스크롤하면 카드가 기울어진 상태 → 정면으로 펴짐 */
function ScrollHero({ titleComponent, footerComponent, children, topOffset = 0 }) {
  const wrapRef = useRef(null);
  const [p, setP] = useState(0);
  const isMobile = typeof window !== "undefined" && window.innerWidth < 768;

  useEffect(() => {
    let raf = null;
    const update = () => {
      raf = null;
      const el = wrapRef.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const range = el.offsetHeight - window.innerHeight;
      const prog = range > 0 ? (topOffset - rect.top) / range : 0;
      setP(Math.min(Math.max(prog, 0), 1));
    };
    const onScroll = () => { if (!raf) raf = requestAnimationFrame(update); };
    update();
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    return () => { window.removeEventListener("scroll", onScroll); window.removeEventListener("resize", onScroll); if (raf) cancelAnimationFrame(raf); };
  }, [topOffset]);

  // 기울기는 스크롤 앞부분(70%)에서 다 펴지도록
  const t = Math.min(p / 0.7, 1);
  const rotate = 22 * (1 - t);
  const scale = (isMobile ? 0.9 : 1.0) + (isMobile ? 0.05 : 0.03) * t;
  const titleTranslate = -24 * t;
  const titleOpacity = 1 - 0.25 * t;

  return (
    <div ref={wrapRef} style={{ position: "relative", height: isMobile ? "140vh" : "150vh" }}>
      <div style={{ position: "sticky", top: topOffset, height: "calc(100vh - " + topOffset + "px)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", overflow: "hidden", padding: "0 16px" }}>
        <div style={{ maxWidth: 900, margin: "0 auto 4px", textAlign: "center", transform: "translateY(" + titleTranslate + "px)", opacity: titleOpacity, willChange: "transform,opacity" }}>
          {titleComponent}
        </div>
        <div style={{ perspective: "1000px", maxWidth: 900, width: "100%" }}>
          <div style={{
            transform: "rotateX(" + rotate + "deg) scale(" + scale + ")",
            transformStyle: "preserve-3d",
            willChange: "transform",
            borderRadius: 22,
            border: "3px solid rgba(14,165,233,0.22)",
            overflow: "hidden",
            background: "#0a192f",
            boxShadow: "0 26px 60px -18px rgba(14,165,233,0.4), 0 8px 24px -12px rgba(0,0,0,0.18)",
          }}>
            <div style={{ height: isMobile ? "min(360px,44vh)" : "min(560px,58vh)", width: "100%" }}>
              {children}
            </div>
          </div>
        </div>
        {footerComponent}
      </div>
    </div>
  );
}

          <h3 style={{ fontSize: 15, color: "#0c4a6e", margin: "20px 0 8px" }}>제8조 (개인정보의 제3자 제공 및 위탁)</h3>
          <p style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.8, marginBottom: 16 }}>
            서비스는 원칙적으로 이용자의 개인정보를 제3자에게 제공하지 않습니다. 다만, 서비스 운영을 위해 다음과 같이 데이터 저장을 위탁하고 있습니다.
          </p>
          <p style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.8, marginBottom: 16, paddingLeft: 12 }}>
            - 위탁업체: Google LLC (Firebase Realtime Database)<br />
            - 위탁 내용: 데이터 저장 및 호스팅<br />
            - 서버 위치: Google Cloud 서버<br />
            - Google 개인정보 처리방침: https://policies.google.com/privacy
          </p>

          <h3 style={{ fontSize: 15, color: "#0c4a6e", margin: "20px 0 8px" }}>제9조 (개인정보 보호책임자)</h3>
          <p style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.8, marginBottom: 16, paddingLeft: 12 }}>
            성명: 조예은<br />
            소속: 대구선원초등학교<br />
            연락처: yeaeun0690@gmail.com<br />
          </p>
          <p style={{ fontSize: 13, color: "#475569", lineHeight: 1.8, marginBottom: 16 }}>
            ※ 개인정보와 관련한 문의사항은 위 보호책임자에게 연락해주시기 바랍니다.
          </p>

          <h3 style={{ fontSize: 15, color: "#0c4a6e", margin: "20px 0 8px" }}>제10조 (처리방침의 변경)</h3>
          <p style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.8, marginBottom: 16 }}>
            본 개인정보 처리방침은 2026년 4월 28일부터 적용됩니다. 처리방침이 변경되는 경우 서비스 내 공지를 통해 안내드립니다.
          </p>

          <div style={{ textAlign: "center", marginTop: 24, paddingTop: 16, borderTop: "1px solid #f1f5f9" }}>
            <p style={{ fontSize: 11, color: "#475569" }}>시행일: 2026년 4월 28일</p>
          </div>
        </div>
      </div>
    </div>
  );

  /* ─── TRIAL MODE ─── */
  if (page === "trial") return (
    <div style={shell}>
      <div style={{ padding: "16px 24px", borderBottom: "1px solid #e5e7eb", background: "rgba(255,255,255,0.92)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", position: "sticky", top: 0, zIndex: 40, textAlign: "center" }}>
        <h1 style={{ fontSize: 22, fontWeight: 400, fontFamily: "'Jua',sans-serif", margin: 0 }}><img src="clownfish.png" style={{ width: 22, height: 22, verticalAlign: "middle", marginRight: 4 }} />체험 모드</h1>
        <p style={{ fontSize: 12, color: "#e07070", margin: "4px 0 0" }}>체험 모드에서는 일기가 저장되지 않습니다</p>
        <button onClick={function() { setPage("home"); setTE([]); }} style={{ ...bSoft, position: "absolute", right: 24, top: 16, padding: "6px 14px", fontSize: 12 }}>홈으로</button>
      </div>
      <div className="diary-wrap">
        <DiaryView entries={trialEntries} setEntries={setTE} save={trialSave} readOnly={false} userId={trialId} />
      </div>
    </div>
  );

  /* ─── STUDENT DIARY ─── */
  if (page === "studentDiary" && currentUser) return (
    <div style={shell}>
      
      <div style={{ padding: "16px 24px", borderBottom: "1px solid #e5e7eb", background: "rgba(255,255,255,0.92)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", position: "sticky", top: 0, zIndex: 40, textAlign: "center" }}>
        <span style={{ ...bdg(), position: "absolute", left: 24, top: 18 }}>{currentUser.schoolCode}</span>
        <h1 style={{ fontSize: 22, fontWeight: 400, fontFamily: "'Jua',sans-serif", margin: 0 }}>{currentUser.name}학생의 탐험 일지</h1>
        <p style={{ fontSize: 12, color: "#475569", margin: "4px 0 0" }}>{currentUser.schoolName}</p>
        <div style={{ position: "absolute", right: 24, top: 14, display: "flex", gap: 6 }}>
          <button onClick={function() { setShowPwChange(!showPwChange); setPwF({ current: "", newPw: "", confirm: "" }); setMsg(""); }} style={{ ...bSoft, padding: "6px 12px", fontSize: 11, color: "#0ea5e9", border: "1px solid #b2ebf2" }}>비밀번호 변경</button>
          <button onClick={logout} style={{ ...bSoft, padding: "6px 14px", fontSize: 12 }}>로그아웃</button>
        </div>
      </div>
      {showPwChange && (
        <div style={{ padding: "16px 24px", maxWidth: 400, margin: "0 auto" }}>
          <div style={{ ...crd, padding: 20, border: "2px solid #b2ebf2" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#0c4a6e", marginBottom: 12 }}>비밀번호 변경</div>
            {msg && <div style={{ padding: "8px 12px", borderRadius: 8, background: msg.includes("✅") ? "#eef7f4" : "#fef2f2", color: msg.includes("✅") ? "#065f46" : "#991b1b", fontSize: 12, marginBottom: 10 }}>{msg}</div>}
            <input value={pwForm.current} onChange={function(e) { setPwF({ ...pwForm, current: e.target.value }); }} placeholder="현재 비밀번호" type="password" style={{ ...inp, marginBottom: 8 }} />
            <input value={pwForm.newPw} onChange={function(e) { setPwF({ ...pwForm, newPw: e.target.value }); }} placeholder="새 비밀번호 (4자리 이상)" type="password" style={{ ...inp, marginBottom: 8 }} />
            <input value={pwForm.confirm} onChange={function(e) { setPwF({ ...pwForm, confirm: e.target.value }); }} onKeyDown={function(e) { if (e.key === "Enter") changePassword(); }} placeholder="새 비밀번호 확인" type="password" style={{ ...inp, marginBottom: 12 }} />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={changePassword} style={{ ...bPri, flex: 1 }}>변경하기</button>
              <button onClick={function() { setShowPwChange(false); setMsg(""); }} style={{ ...bSoft, flex: 1 }}>취소</button>
            </div>
          </div>
        </div>
      )}
      <div className="diary-wrap">
        <DiaryView entries={myEntries} setEntries={setME} save={saveMyEntries} readOnly={false} userId={currentUser ? currentUser.id : null} />
      </div>
    </div>
  );

  /* ─── TEACHER DASH ─── */
  if (page === "teacherDash" && currentUser) return (
    <div style={shell}>
      
      <div style={{ padding: "16px 24px", borderBottom: "1px solid #e5e7eb", background: "rgba(255,255,255,0.92)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", position: "sticky", top: 0, zIndex: 40, textAlign: "center" }}>
        <h1 style={{ fontSize: 22, fontWeight: 400, fontFamily: "'Jua',sans-serif", margin: 0 }}>{currentUser.schoolName}</h1>
        <p style={{ fontSize: 12, color: "#475569", margin: "4px 0 0" }}>선생님: {currentUser.teacherName} · 학교 코드: <b style={{ color: "#6366f1" }}>{currentUser.schoolCode}</b></p>
        <button onClick={logout} style={{ ...bSoft, position: "absolute", right: 24, top: 16, padding: "6px 14px", fontSize: 12 }}>로그아웃</button>
      </div>
      <div style={{ padding: "20px 24px", maxWidth: 760, margin: "0 auto" }}>
        {msgBox}
        {/* Parental Consent Section */}
        <div style={{ ...crd, marginBottom: 16, border: (consentChecked || consentNA) ? "1px solid #b2ebf2" : "2px solid #fbbf24", background: (consentChecked || consentNA) ? "#f8fffe" : "#fffbeb" }}>
          <div style={lbl}>보호자 동의 확인</div>
          <p style={{ fontSize: 12, color: "#1e293b", lineHeight: 1.7, margin: "0 0 12px" }}>
            만 14세 미만 학생의 개인정보를 수집하려면 법정대리인(보호자)의 동의가 필요합니다.<br />
            아래 동의서 양식을 배포하고, 동의서를 수합한 후 학생을 등록해주세요.
          </p>
          <button onClick={function() { setShowConsent(!showConsent); }}
            style={{ ...bSoft, fontSize: 12, marginBottom: 12 }}>
            {showConsent ? "동의서 양식 닫기" : "보호자 동의서 양식 보기"}
          </button>
          {showConsent && (
            <div style={{ padding: 16, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 10, marginBottom: 12, fontSize: 12, color: "#1e293b", lineHeight: 1.8 }}>
              <div style={{ textAlign: "center", fontWeight: 700, fontSize: 15, marginBottom: 12, fontFamily: "'Jua',sans-serif" }}>개인정보 수집·이용 동의서 (보호자용)</div>
              <p style={{ marginBottom: 8 }}>
                <b>서비스명:</b> 마음 바다 탐험대 (감정 일기 웹앱)<br />
                <b>운영 목적:</b> 학급 감정 교육 활동 (감정 일기 작성, 감정 분석, 마음 대화)
              </p>
              <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 10, fontSize: 11 }}>
                <thead>
                  <tr style={{ background: "#f1f5f9" }}>
                    <th style={{ border: "1px solid #e2e8f0", padding: "6px 8px", textAlign: "left" }}>수집 항목</th>
                    <th style={{ border: "1px solid #e2e8f0", padding: "6px 8px", textAlign: "left" }}>이용 목적</th>
                    <th style={{ border: "1px solid #e2e8f0", padding: "6px 8px", textAlign: "left" }}>보유 기간</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td style={{ border: "1px solid #e2e8f0", padding: "6px 8px" }}>번호(또는 이름), 학년, 반</td>
                    <td style={{ border: "1px solid #e2e8f0", padding: "6px 8px" }}>학생 식별 및 활동 관리</td>
                    <td style={{ border: "1px solid #e2e8f0", padding: "6px 8px" }}>학기 종료 시 삭제</td>
                  </tr>
                  <tr>
                    <td style={{ border: "1px solid #e2e8f0", padding: "6px 8px" }}>감정 일기 내용, 분석 결과</td>
                    <td style={{ border: "1px solid #e2e8f0", padding: "6px 8px" }}>감정 교육 활동</td>
                    <td style={{ border: "1px solid #e2e8f0", padding: "6px 8px" }}>학기 종료 시 삭제</td>
                  </tr>
                </tbody>
              </table>
              <p style={{ marginBottom: 8 }}>
                ※ 번호 등록 방식 사용 시 학생의 실명이 수집되지 않습니다.<br />
                ※ 주민등록번호, 연락처, 이메일 등 민감정보는 수집하지 않습니다.<br />
                ※ 수집된 정보는 Firebase(Google) 서버에 암호화 저장됩니다.<br />
                ※ 보호자는 언제든지 담임교사에게 열람·정정·삭제를 요청할 수 있습니다.
              </p>
              <div style={{ borderTop: "1px solid #e2e8f0", paddingTop: 10, marginTop: 10 }}>
                <p>본인은 위 내용을 충분히 이해하였으며, 자녀의 개인정보 수집·이용에 동의합니다.</p>
                <p style={{ marginTop: 8 }}>날짜: ______년 ___월 ___일</p>
                <p>학생 이름: _____________ &nbsp;&nbsp; 보호자 성명: _____________ (서명)</p>
              </div>
              <p style={{ fontSize: 10, color: "#475569", marginTop: 10 }}>※ 이 양식을 인쇄하여 보호자에게 배포하고, 서명된 동의서를 수합해주세요.</p>
            </div>
          )}
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, color: "#1e293b" }}>
            <input type="checkbox" checked={consentChecked} onChange={function(e) { setConsentChecked(e.target.checked); if (e.target.checked) setConsentNA(false); }}
              style={{ width: 18, height: 18, accentColor: "#0ea5e9", cursor: "pointer" }} />
            <span>보호자 동의서를 수합하였음을 확인합니다</span>
          </label>
          <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, color: "#475569", marginTop: 8 }}>
            <input type="checkbox" checked={consentNA} onChange={function(e) { setConsentNA(e.target.checked); if (e.target.checked) setConsentChecked(false); }}
              style={{ width: 18, height: 18, accentColor: "#94a3b8", cursor: "pointer" }} />
            <span>해당 없음 (만 15세 이상으로 보호자 동의 불필요)</span>
          </label>
        </div>
        {/* Add student */}
        <div style={{ ...crd, marginBottom: 16, opacity: (consentChecked || consentNA) ? 1 : 0.4, pointerEvents: (consentChecked || consentNA) ? "auto" : "none" }}>
          <div style={lbl}><img src="clownfish.png" style={{ width: 14, height: 14, verticalAlign: "middle", marginRight: 4 }} />학생 추가</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <input value={studentForm.studentName} onChange={e => setStF({ ...studentForm, studentName: e.target.value })} placeholder="이름 (선택)" style={{ ...inp, flex: "2 1 160px" }} />
            <input value={studentForm.grade} onChange={e => setStF({ ...studentForm, grade: e.target.value })} placeholder="학년" style={{ ...inp, flex: "1 1 80px" }} />
            <input value={studentForm.classNumber} onChange={e => setStF({ ...studentForm, classNumber: e.target.value })} placeholder="반" style={{ ...inp, flex: "1 1 80px" }} />
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <input value={studentForm.loginId} onChange={e => setStF({ ...studentForm, loginId: e.target.value })} placeholder="아이디 (필수)" style={{ ...inp, flex: 1 }} />
            <input value={studentForm.password} onChange={e => setStF({ ...studentForm, password: e.target.value })} placeholder="비밀번호 (필수)" style={{ ...inp, flex: 1 }} />
          </div>
          <button onClick={addStudent} style={{ ...bPri, marginTop: 10 }}><img src="clownfish.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 4 }} />학생 추가</button>
        </div>
        {/* Bulk add students */}
        <div style={{ ...crd, marginBottom: 16, opacity: (consentChecked || consentNA) ? 1 : 0.4, pointerEvents: (consentChecked || consentNA) ? "auto" : "none" }}>
          <div style={lbl}><img src="clownfish.png" style={{ width: 14, height: 14, verticalAlign: "middle", marginRight: 4 }} />학생 일괄 등록</div>
          <p style={{ fontSize: 11, color: "#475569", margin: "0 0 10px" }}>학생 수를 입력하면 1번~N번으로 자동 등록됩니다<br />아이디: s1, s2, s3... / 초기 비밀번호: 1234</p>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
            <input value={bulkCount} onChange={function(e) { setBulkCount(e.target.value); }} placeholder="학생 수" type="number" min="1" max="50" style={{ ...inp, width: 80, textAlign: "center" }} />
            <span style={{ fontSize: 13, color: "#1e293b" }}>명</span>
            <input value={bulkGrade} onChange={function(e) { setBulkGrade(e.target.value); }} placeholder="학년" style={{ ...inp, width: 70 }} />
            <input value={bulkClass} onChange={function(e) { setBulkClass(e.target.value); }} placeholder="반" style={{ ...inp, width: 70 }} />
          </div>
          <button onClick={bulkAddStudents} disabled={!bulkCount} style={{ ...bPri, marginTop: 10, background: "#8b5cf6", opacity: bulkCount ? 1 : 0.4 }}>1번~{bulkCount || "N"}번 일괄 생성</button>
        </div>
        {/* Student list */}
        <div style={{ ...crd, marginBottom: 16 }}>
          <div style={lbl}><img src="starfish.png" style={{ width: 14, height: 14, verticalAlign: "middle", marginRight: 4 }} />학생 명단 ({myStudents.length}명)</div>
          {myStudents.length === 0 && <p style={{ color: "#475569", fontSize: 13 }}>아직 등록된 학생이 없습니다.</p>}
          {myStudents.map(s => (
            <div key={s.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", marginBottom: 6, background: "#f8fafc", borderRadius: 12, border: "1px solid #f1f5f9", flexWrap: "wrap", gap: 8 }}>
              <div>
                <div style={{ fontWeight: 500, fontSize: 14 }}>{s.name}</div>
                <div style={{ fontSize: 11, color: "#475569" }}>아이디: {s.loginId || "-"} {s.grade ? " · " + s.grade + "학년 " + s.classNumber + "반" : ""}</div>
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => viewStudentRecords(s)} style={{ ...bSoft, padding: "6px 12px", fontSize: 12, background: (viewStu && viewStu.id === s.id) ? "#eef2ff" : "#f1f5f9", color: (viewStu && viewStu.id === s.id) ? "#6366f1" : "#475569", border: "1px solid " + ((viewStu && viewStu.id === s.id) ? "#c7d2fe" : "#e2e8f0") }}>항해 일지</button>
                <button onClick={() => clearStuRecords(s)} style={{ ...bSoft, padding: "6px 12px", fontSize: 12, color: "#d97706", border: "1px solid #fde68a", background: "#fffbeb" }}>비우기</button>
                <button onClick={() => delStudent(s)} style={{ ...bDanger, padding: "6px 12px", fontSize: 12 }}>삭제</button>
              </div>
            </div>
          ))}
        </div>
        {/* View records */}
        {viewStu && (
          <div style={crd}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div>
                <div style={lbl}>학생 항해 일지</div>
                <div style={{ fontSize: 16, fontWeight: 600 }}>{viewStu.name} {viewStu.grade && <span style={{ fontSize: 13, color: "#475569", fontWeight: 400 }}>({viewStu.grade}학년 {viewStu.classNumber}반)</span>}</div>
                <div style={{ fontSize: 12, color: "#475569", marginTop: 2 }}>저장된 일기: {viewEntries.length}개</div>
              </div>
              <button onClick={() => { setVS(null); setVE([]); }} style={{ ...bSoft, padding: "6px 12px", fontSize: 12 }}>닫기</button>
            </div>
            <DiaryView entries={viewEntries} setEntries={setVE} save={async (e) => await sSet(dKey(viewStu.id), e)} readOnly={true} />
          </div>
        )}
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
