// ─── Subject Detection: "my emotion" vs "someone else's emotion" ───
// Person words (bare form) - these alone don't determine subject vs object
const PERSON_WORDS = [
  "친구","엄마","아빠","부모님","동생","형","오빠","언니","누나",
  "선생님","쌤","할머니","할아버지","그","그녀","걔","쟤","얘",
  "그애","그사람","애","애들","남자","여자","아이","사람",
  "팀원","동료","상대방","상대","짝꿍","반친구","옆자리",
];
// Subject particles → the person IS the subject → emotion belongs to THEM
const SUBJ_PARTICLES = ["가","이","는","은","도","께서","에서"];
// Object/companion particles → the person is NOT subject → emotion belongs to ME
const OBJ_PARTICLES = ["와","과","이랑","랑","하고","한테","에게","한테서","에게서","를","을","의","보다","처럼","같이","만나","때문에","때문","덕분에","덕분"];
// Self-reference: always means "my" emotion
const SELF_SUBJECTS = [
  "나","나는","나도","내가","나의","내",
  "저","저는","저도","제가","제",
  "본인","본인이","본인은",
  "스스로","스스로가",
];
const LOOK_BACK = 4;

function isOtherSubject(tokens, emotionIdx) {
  const start = Math.max(0, emotionIdx - LOOK_BACK);
  for (let i = start; i < emotionIdx; i++) {
    const t = tokens[i];

    // Self-reference found → definitely my emotion
    if (SELF_SUBJECTS.some(s => t === s || t.startsWith(s))) return false;

    // Check if token contains a person word
    const personMatch = PERSON_WORDS.find(p => t === p || t.startsWith(p));
    if (personMatch) {
      const suffix = t.slice(personMatch.length); // particle after the person word

      // No particle (bare word like "친구") → check next token for particle
      if (suffix === "") {
        const nextTok = i + 1 < tokens.length ? tokens[i + 1] : "";
        // If next token is an object/companion particle or starts with one
        if (OBJ_PARTICLES.some(op => nextTok === op || nextTok.startsWith(op))) return false;
        // If next token is a subject particle
        if (SUBJ_PARTICLES.some(sp => nextTok === sp)) return true;
        // Bare person word with no clear particle → ambiguous, treat as other's by default
        return true;
      }

      // Has object/companion particle attached → my emotion
      if (OBJ_PARTICLES.some(op => suffix === op || suffix.startsWith(op))) return false;

      // Has subject particle attached → other's emotion
      if (SUBJ_PARTICLES.some(sp => suffix === sp || suffix.startsWith(sp))) return true;

      // Particle not recognized → default to other's
      return true;
    }
  }
  // No person word found = diary default = about me
  return false;
}

var NEGATION_WORDS = ["안","않","못","아닌","아니","없","안돼","못해","안해","안했","않았","못했"];

function analyzeEntry(text) {
  const norm = normalizeKorean(text);
  const tokens = norm.split(" ").filter(Boolean);
  const hits = [];
  const excluded = [];
  const seen = new Set();

  // Check if token is preceded by negation
  function isNegated(idx) {
    if (idx <= 0) return false;
    var prev = tokens[idx - 1];
    return NEGATION_WORDS.some(function(n) { return prev === n || prev.endsWith(n); });
  }

  for (let ti = 0; ti < tokens.length; ti++) {
    const tok = tokens[ti];
    const st = stemKorean(tok);
    for (const emo of EMOTIONS_28) {
      if (seen.has(emo.name)) continue;
      for (const kw of emo.kw) {
        const ks = stemKorean(kw);
        if ((st.length >= 2 && ks.length >= 2 && (st.includes(ks) || ks.startsWith(st))) || tok.includes(kw) || kw.startsWith(tok)) {
          seen.add(emo.name);
          // Skip if negated (e.g., "안 슬퍼", "안 기뻐")
          if (isNegated(ti)) break;
          const entry = { name: emo.name, label: emo.label, q: emo.q, val9: emo.val, aro9: emo.aro, valStd: ((emo.val - 1) / 8) * 2 - 1, aroStd: ((emo.aro - 1) / 8) * 2 - 1, token: tok };
          if (isOtherSubject(tokens, ti)) {
            excluded.push(entry);
          } else {
            hits.push(entry);
          }
          break;
        }
      }
    }
  }

  let posS = 0, negS = 0;
  const mP = [], mN = [];
  let w = 1;
  for (let ti = 0; ti < tokens.length; ti++) {
    const tok = tokens[ti];
    const st = stemKorean(tok);
    if (STRENGTH.strong.some(m => st === m || tok === m)) { w = 2; continue; }
    if (STRENGTH.weak.some(m => st === m || tok === m)) { w = 0.5; continue; }
    let f = false;
    for (const pw of POS_EXTRA) {
      const ps = stemKorean(pw);
      if ((st.length >= 2 && ps.length >= 2 && (st.includes(ps) || ps.startsWith(st))) || tok.includes(pw)) {
        // Check subject for extended lexicon too
        if (!isOtherSubject(tokens, ti)) {
          posS += w; mP.push({ word: pw, weight: w });
        }
        f = true; break;
      }
    }
    if (!f) {
      for (const nw of NEG_EXTRA) {
        const ns = stemKorean(nw);
        if ((st.length >= 2 && ns.length >= 2 && (st.includes(ns) || ns.startsWith(st))) || tok.includes(nw)) {
          if (!isOtherSubject(tokens, ti)) {
            negS += w; mN.push({ word: nw, weight: w });
          }
          f = true; break;
        }
      }
    }
    if (f) w = 1; else if (w !== 1) w = 1;
  }
  for (const h of hits) { if (h.val9 > 5) posS += 1; else if (h.val9 < 5) negS += 1; }
  const tot = posS + negS;
  const aV = hits.length ? hits.reduce((s, h) => s + h.val9, 0) / hits.length : 5;
  const aA = hits.length ? hits.reduce((s, h) => s + h.aro9, 0) / hits.length : 5;
  return { hits, excluded, matchedPos: mP, matchedNeg: mN, posScore: posS, negScore: negS, posPct: tot > 0 ? (posS / tot) * 100 : 0, negPct: tot > 0 ? (negS / tot) * 100 : 0, valence9: aV, arousal9: aA, valStd: ((aV - 1) / 8) * 2 - 1, aroStd: ((aA - 1) / 8) * 2 - 1 };
}

// Safe normalizer: Firebase may strip empty arrays or fields
function safeAnalysis(a) {
  if (!a) return { hits:[], excluded:[], matchedPos:[], matchedNeg:[], posScore:0, negScore:0, posPct:0, negPct:0, valence9:5, arousal9:5, valStd:0, aroStd:0 };
  return {
    hits: a.hits || [],
    excluded: a.excluded || [],
    matchedPos: a.matchedPos || [],
    matchedNeg: a.matchedNeg || [],
    posScore: a.posScore || 0,
    negScore: a.negScore || 0,
    posPct: a.posPct || 0,
    negPct: a.negPct || 0,
    valence9: a.valence9 || 5,
    arousal9: a.arousal9 || 5,
    valStd: a.valStd || 0,
    aroStd: a.aroStd || 0,
  };
}
function safeEntries(arr) {
  if (!arr || !Array.isArray(arr)) return [];
  return arr.map(function(e) { return { date: e.date || "", text: e.text || "", ts: e.ts || Date.now(), analysis: safeAnalysis(e.analysis) }; });

    [0.25, 0.5, 0.75, 1].forEach(s => { c.beginPath(); c.arc(cx, cy, rad * s, 0, Math.PI * 2); c.strokeStyle = s === 1 ? "rgba(0,0,0,0.12)" : "rgba(0,0,0,0.06)"; c.lineWidth = 1; c.stroke(); });
    c.strokeStyle = "rgba(0,0,0,0.15)"; c.lineWidth = 1.2; c.beginPath(); c.moveTo(cx - rad, cy); c.lineTo(cx + rad, cy); c.stroke(); c.beginPath(); c.moveTo(cx, cy - rad); c.lineTo(cx, cy + rad); c.stroke();
    c.font = "600 11px 'Gowun Dodum',system-ui"; c.fillStyle = "#94a3b8"; c.textAlign = "center";

    c.save(); c.translate(cx - 18, cy + rad - 28); c.rotate(-Math.PI / 2); c.fillText("↓ 낮은 에너지", 0, 0); c.restore();

    const pad = { l: 40, r: 16, t: 16, b: 30 }, w = W - pad.l - pad.r, h = H - pad.t - pad.b, n = entries.length;
    const xO = (i) => pad.l + (i / (n - 1)) * w, yO = (v) => pad.t + h - (v / 100) * h;

function detectSituations(text) {
  const norm = normalizeKorean(text);
  const tokens = norm.split(" ").filter(Boolean);
  const found = [];
  for (const sit of SITUATION_MAP) {
    for (const tok of tokens) {
      const st = stemKorean(tok);
      if (sit.kw.some(kw => tok.includes(kw) || st.includes(stemKorean(kw)))) {
        found.push(sit);
        break;
      }
    }
  }
  return found;
}

function getSuggestions(situations) {
  // Collect unique emotion names from all matched situations, ranked by frequency
  const freq = {};
  for (const sit of situations) {
    for (const eName of sit.suggest) {
      freq[eName] = (freq[eName] || 0) + 1;
    }
  }
  // Sort by frequency, take top 6
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 6);
  // Map to full emotion objects
  return sorted.map(([name]) => EMOTIONS_28.find(e => e.name === name)).filter(Boolean);
}

var NEED_OPTIONS = ["이해받고 싶었다","함께하고 싶었다","존중받고 싶었다","안전하고 싶었다","인정받고 싶었다","자유롭고 싶었다","공평하길 원했다","사랑받고 싶었다","편안하고 싶었다","재미있고 싶었다"];

function MindChat({ entries, userId }) {
  var [chats, setChats] = useState([]);
  var [active, setActive] = useState(null); // current conversation
  var [customText, setCustomText] = useState("");
  var [showCustom, setShowCustom] = useState(false);
  var [loaded, setLoaded] = useState(false);

  // Load saved chats
  useEffect(function() {
    if (!userId) return;
    (async function() {
      var saved = await sGet(chatKey(userId));
      if (saved && Array.isArray(saved)) setChats(saved);
      setLoaded(true);
    })();
  }, [userId]);

  // Save chats
  var saveChats = async function(updated) {
    setChats(updated);
    if (userId) await sSet(chatKey(userId), updated);
  };

  // Find negative emotion entries that don't have a chat yet
  var negEntries = entries.filter(function(en) {
    var a = en.analysis;
    var hasNeg = (a.hits || []).some(function(h) { return h.val9 < 5; }) || (a.matchedNeg || []).length > 0;
    var hasChat = chats.some(function(ch) { return ch.entryTs === en.ts; });
    return hasNeg && !hasChat;
  });

  // Completed chats
  var completed = chats.filter(function(ch) { return ch.completed; });

  // Start a new conversation
  var startChat = function(en) {
    var negEmo = (en.analysis.hits || []).filter(function(h) { return h.val9 < 5; }).map(function(h) { return h.label; });
    setActive({
      entryTs: en.ts, entryDate: en.date, entryText: en.text,
      emotion: negEmo.join(", ") || "부정 감정",
      step: 1, observation: en.text, feeling: negEmo.join(", "),
      need: "", action: "", helpful: "", nextPlan: "", completed: false
    });
    setShowCustom(false); setCustomText("");
  };

  // Select an answer for current step
  var selectAnswer = function(value) {
    if (!active) return;
    var updated = { ...active };
    if (active.step === 3) updated.need = value;
    else if (active.step === 4) updated.action = value;
    else if (active.step === 5) updated.helpful = value;
    else if (active.step === 6) updated.nextPlan = value;

    if (active.step < 6) {
      updated.step = active.step + 1;
      setActive(updated);
    } else {
      // Complete!
      updated.completed = true;
      updated.step = 7;
      var newChats = [...chats, updated];
      saveChats(newChats);
      setActive(updated);
    }
    setShowCustom(false); setCustomText("");
  };

  // Custom input confirm
  var confirmCustom = function() {
    if (customText.trim()) {
      selectAnswer(customText.trim());
    }
  };

  var stepStyle = { ...crd, padding: 16, marginBottom: 12 };
  var stepLabel = function(icon, text) {
    return { fontSize: 14, fontWeight: 500, color: "#4338ca", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 };
  };
  var optBtn = function(text, onClick) {
    return (
      <button key={text} onClick={function() { onClick(text); }}
        style={{ padding: "10px 16px", fontSize: 13, fontWeight: 500, background: "#eef2ff", color: "#6366f1", border: "2px solid #c7d2fe", borderRadius: 12, cursor: "pointer", transition: "all 0.15s" }}
        onMouseEnter={function(e) { e.target.style.background = "#6366f1"; e.target.style.color = "#fff"; }}
        onMouseLeave={function(e) { e.target.style.background = "#eef2ff"; e.target.style.color = "#6366f1"; }}
      >{text}</button>
    );
  };

  // Render custom input area
  var renderCustomInput = function() {
    if (!showCustom) return (
      <button onClick={function() { setShowCustom(true); }}
        style={{ padding: "10px 16px", fontSize: 13, fontWeight: 500, background: "#f8fafc", color: "#475569", border: "2px dashed #e2e8f0", borderRadius: 12, cursor: "pointer" }}>
        <img src="conch.png" style={{ width: 14, height: 14, verticalAlign: "middle", marginRight: 3 }} />직접 쓰기
      </button>
    );
    return (
      <div style={{ display: "flex", gap: 8, width: "100%", marginTop: 4 }}>
        <input value={customText} onChange={function(e) { setCustomText(e.target.value); }}
          onKeyDown={function(e) { if (e.key === "Enter") confirmCustom(); }}
          placeholder="자유롭게 적어주세요..." autoFocus
          style={{ ...inp, flex: 1, fontSize: 13 }} />
        <button onClick={confirmCustom} disabled={!customText.trim()}
          style={{ ...bPri, padding: "10px 18px", fontSize: 13, opacity: customText.trim() ? 1 : 0.4, flexShrink: 0 }}>확인</button>
      </div>
    );
  };

  if (!loaded) return <div style={{ textAlign: "center", padding: 40, color: "#475569" }}>로딩 중...</div>;

  // Active conversation
  if (active) {
    return (
      <div>
        {/* Entry info */}
        <div style={{ ...crd, padding: 14, marginBottom: 16, background: "linear-gradient(135deg, #eef2ff, #faf5ff)", border: "1px solid #c7d2fe" }}>
          <div style={{ fontSize: 12, color: "#475569" }}>{active.entryDate}</div>
          <div style={{ fontSize: 14, fontWeight: 500, color: "#1e293b", margin: "4px 0" }}>"{active.entryText}"</div>
          <div style={{ fontSize: 12, color: "#6366f1" }}>감지된 감정: {active.emotion}</div>
        </div>

        {/* Step progress */}
        <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
          {[1,2,3,4,5,6].map(function(s) {
            return <div key={s} style={{ flex: 1, height: 4, borderRadius: 2, background: s <= active.step ? "#6366f1" : "#e2e8f0", transition: "all 0.3s" }} />;
          })}
        </div>

        {/* Step 1-2: Auto-filled */}
        {active.step >= 1 && (
          <div style={stepStyle}>
            <div style={stepLabel()}><img src="periscope.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />관찰 - 무슨 일이 있었나요?</div>
            <div style={{ padding: "10px 14px", background: "#f8fafc", borderRadius: 10, fontSize: 13, color: "#475569" }}>{active.observation}</div>
          </div>
        )}
        {active.step >= 2 && (
          <div style={stepStyle}>
            <div style={stepLabel()}><img src="heart.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />느낌 - 어떤 감정이 들었나요?</div>
            <div style={{ padding: "10px 14px", background: "#f8fafc", borderRadius: 10, fontSize: 13, color: "#475569" }}>{active.feeling}</div>
          </div>
        )}

        {/* Step 3: Need */}
        {active.step === 3 && (
          <div style={{ ...stepStyle, border: "2px solid #c7d2fe" }}>
            <div style={stepLabel()}><img src="starfish.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />욕구 - 무엇을 원했기 때문에 그런 감정이 들었을까요?</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {NEED_OPTIONS.map(function(opt) { return optBtn(opt, selectAnswer); })}
              {renderCustomInput()}
            </div>
          </div>
        )}
        {active.step > 3 && (
          <div style={stepStyle}>
            <div style={stepLabel()}><img src="starfish.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />욕구</div>
            <div style={{ padding: "10px 14px", background: "#eef2ff", borderRadius: 10, fontSize: 13, color: "#6366f1", fontWeight: 400 }}>{active.need}</div>
          </div>
        )}

        {/* Step 4: Action */}
        {active.step === 4 && (
          <div style={{ ...stepStyle, border: "2px solid #c7d2fe" }}>
            <div style={stepLabel()}><img src="jellyfish.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />행동 - 그래서 어떤 행동을 했나요?</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {ACTION_OPTIONS.map(function(opt) { return optBtn(opt, selectAnswer); })}
              {renderCustomInput()}
            </div>
          </div>
        )}
        {active.step > 4 && (
          <div style={stepStyle}>
            <div style={stepLabel()}><img src="jellyfish.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />행동</div>
            <div style={{ padding: "10px 14px", background: "#eef2ff", borderRadius: 10, fontSize: 13, color: "#6366f1", fontWeight: 400 }}>{active.action}</div>
          </div>
        )}

        {/* Step 5: Helpful */}
        {active.step === 5 && (
          <div style={{ ...stepStyle, border: "2px solid #c7d2fe" }}>
            <div style={stepLabel()}><img src="deep_dive.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />돌아보기 - 그 행동이 내가 원했던 것에 도움이 되었나요?</div>
            <div style={{ display: "flex", gap: 12 }}>
              {[["😊 도움됐어","도움됐어"],["😐 보통이야","보통"],["😢 안됐어","안됐어"]].map(function(opt) {
                return (
                  <button key={opt[1]} onClick={function() { selectAnswer(opt[1]); }}
                    style={{ flex: 1, padding: "14px 8px", fontSize: 14, fontWeight: 500, background: "#f8fafc", color: "#475569", border: "2px solid #e2e8f0", borderRadius: 14, cursor: "pointer", textAlign: "center" }}>
                    {opt[0]}
                  </button>
                );
              })}
            </div>
          </div>
        )}
        {active.step > 5 && (
          <div style={stepStyle}>
            <div style={stepLabel()}><img src="deep_dive.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />돌아보기</div>
            <div style={{ padding: "10px 14px", background: active.helpful === "도움됐어" ? "#eef7f4" : active.helpful === "안됐어" ? "#fef2f2" : "#f8fafc", borderRadius: 10, fontSize: 13, color: "#475569", fontWeight: 400 }}>{active.helpful}</div>
          </div>
        )}

        {/* Step 6: Next plan */}
        {active.step === 6 && (
          <div style={{ ...stepStyle, border: "2px solid #c7d2fe" }}>
            <div style={stepLabel()}><img src="submarine.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />다음 항해 - 다음에 비슷한 상황이 오면 어떻게 하고 싶어?</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {NEXT_OPTIONS.map(function(opt) { return optBtn(opt, selectAnswer); })}
              {renderCustomInput()}
            </div>
          </div>
        )}

        {/* Completed */}
        {active.step === 7 && (
          <div style={{ ...crd, padding: 20, background: "linear-gradient(135deg, #eef2ff, #e0e7ff)", border: "2px solid #a5b4fc", textAlign: "center" }}>
            <div style={{ marginBottom: 8 }}><img src="heart.png" style={{ width: 40, height: 40 }} /></div>
            <div style={{ fontSize: 16, fontWeight: 600, color: "#4338ca", marginBottom: 6 }}>탐험 기록 완료!</div>
            <div style={{ fontSize: 13, color: "#6366f1", marginBottom: 4 }}>"{active.need}" 를 원했고</div>

            <div style={{ fontSize: 13, color: "#6366f1", marginBottom: 4 }}>결과는 "{active.helpful}"</div>
            <div style={{ fontSize: 13, color: "#6366f1", marginBottom: 12 }}>다음엔 "{active.nextPlan}"</div>

            <button onClick={function() { setActive(null); }} style={{ ...bPri, marginTop: 16, padding: "12px 32px" }}>돌아가기</button>
          </div>
        )}

        {/* Cancel */}
        {active.step < 7 && active.step > 2 && (
          <button onClick={function() { setActive(null); setShowCustom(false); setCustomText(""); }}
            style={{ ...bSoft, fontSize: 12, marginTop: 8 }}>나중에 하기</button>
        )}
        {active.step <= 2 && (
          <button onClick={function() { setActive({ ...active, step: 3 }); }}
            style={{ ...bPri, width: "100%", marginTop: 8 }}>다음 단계로</button>
        )}
      </div>
    );
  }

  // Main list view
  return (
    <div>
      {negEntries.length > 0 && (
        <div>
          <div style={lbl}><img src="heart.png" style={{ width: 14, height: 14, verticalAlign: "middle", marginRight: 4 }} />대화가 필요한 탐험 일지</div>
          <p style={{ fontSize: 12, color: "#475569", margin: "-8px 0 12px" }}>부정적 감정이 감지된 일기예요. 마음 속을 탐험해볼까요?</p>
          {negEntries.slice(0, 5).map(function(en) {
            var negEmo = (en.analysis.hits || []).filter(function(h) { return h.val9 < 5; }).map(function(h) { return h.label; });
            return (
              <div key={en.ts} style={{ ...crd, padding: "14px 16px", marginBottom: 8, cursor: "pointer", border: "2px solid #e2e8f0", transition: "all 0.15s" }}
                onClick={function() { startChat(en); }}
                onMouseEnter={function(e) { e.currentTarget.style.borderColor = "#c7d2fe"; }}
                onMouseLeave={function(e) { e.currentTarget.style.borderColor = "#e2e8f0"; }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{en.date}</span>
                  <span style={{ fontSize: 11, color: "#e07070", fontWeight: 400 }}>{negEmo.join(", ")}</span>
                </div>
                <div style={{ fontSize: 12, color: "#1e293b", marginTop: 4, lineHeight: 1.5 }}>{en.text.length > 60 ? en.text.slice(0, 60) + "..." : en.text}</div>
                <div style={{ fontSize: 11, color: "#6366f1", marginTop: 6 }}>탭해서 마음 대화 시작 →</div>
              </div>
            );
          })}
        </div>
      )}
      {negEntries.length === 0 && completed.length === 0 && (
        <EmptyState icon="" text="부정적 감정이 발견되지 않았어요. 감정 일기를 먼저 작성해보세요." action={null} />
      )}
      {completed.length > 0 && (
        <div style={{ marginTop: negEntries.length > 0 ? 24 : 0 }}>
          <div style={lbl}><img src="heart.png" style={{ width: 14, height: 14, verticalAlign: "middle", marginRight: 4 }} />완료된 마음 대화 ({completed.length}개)</div>
          {completed.slice().reverse().map(function(ch, i) {
            return (
              <div key={i} style={{ ...crd, padding: "12px 14px", marginBottom: 8 }}>
                <div style={{ fontSize: 12, fontWeight: 500, color: "#1e293b" }}>{ch.entryDate} - {ch.emotion}</div>
                <div style={{ fontSize: 11, color: "#1e293b", margin: "4px 0" }}>"{ch.entryText.slice(0, 40)}..."</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6 }}>
                  <span style={{ padding: "3px 8px", borderRadius: 8, background: "#eef2ff", color: "#6366f1", fontSize: 10 }}>원함: {ch.need}</span>
                  <span style={{ padding: "3px 8px", borderRadius: 8, background: "#f8fafc", color: "#475569", fontSize: 10 }}>행동: {ch.action}</span>
                  <span style={{ padding: "3px 8px", borderRadius: 8, background: ch.helpful === "도움됐어" ? "#eef7f4" : ch.helpful === "안됐어" ? "#fef2f2" : "#f8fafc", color: ch.helpful === "도움됐어" ? "#5bb5a6" : ch.helpful === "안됐어" ? "#e07070" : "#94a3b8", fontSize: 10 }}>{ch.helpful}</span>
                  <span style={{ padding: "3px 8px", borderRadius: 8, background: "#f5f3ff", color: "#7c3aed", fontSize: 10 }}>다음: {ch.nextPlan}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  { sit: "친구가 웃긴 이야기를 해줬어요", feel: "배꼽이 빠지게 웃게 돼요", ans: "즐거움", wrongs: ["슬픔","긴장","외로움"] },
  { sit: "엄마가 아프셔서 누워 계세요", feel: "마음이 무겁고 뭔가 해드리고 싶어요", ans: "슬픔", wrongs: ["신남","지루함","만족"] },
  { sit: "발표에서 실수를 했어요", feel: "얼굴이 빨개지고 구멍에 숨고 싶어요", ans: "죄책감", wrongs: ["행복","편안","희열"] },
  { sit: "매일 같은 일상이 반복돼요", feel: "아무것도 하기 싫고 멍해져요", ans: "지루함", wrongs: ["신남","분노","감사"] },
  { sit: "친구가 전학 온다고 해요", feel: "어떤 아이일지 궁금하고 설레요", ans: "흥미", wrongs: ["슬픔","피곤","분노"] },
  { sit: "노력한 만큼 성적이 올랐어요", feel: "가슴이 벅차고 눈물이 날 것 같아요", ans: "희열", wrongs: ["지루함","외로움","짜증"] },
  { sit: "나만 모르는 이야기를 친구들이 해요", feel: "소외된 느낌이 들고 마음이 쓸쓸해요", ans: "외로움", wrongs: ["행복","신남","만족"] },
  { sit: "좋아하는 노래를 들으며 걸어요", feel: "발걸음이 가볍고 콧노래가 나와요", ans: "편안", wrongs: ["분노","긴장","스트레스"] },
];


// Preload deep sea game assets
var DS_IMGS = {};
["emo_angry","emo_shy","emo_excited","emo_happy","emo_joy","emo_sad","emo_content"].forEach(function(name) {
  var img = new Image(); img.src = name + ".png"; DS_IMGS[name] = img;
});
var DS_MASCOT = new Image(); DS_MASCOT.src = "mascot.png";
var DS_FACES = ["emo_angry","emo_shy","emo_excited","emo_happy","emo_joy","emo_sad","emo_content"];

function DeepSeaGame({ onBack }) {
  var canRef = useRef(null);
  var gameRef = useRef(null);
  var animRef = useRef(null);
  var [depth, setDepth] = useState(0);
  var [oxygen, setOxygen] = useState(100);
  var [gameState, setGameState] = useState("idle");
  var [maxDepth, setMaxDepth] = useState(0);
  var [score, setScore] = useState(0);
  var [difficulty, setDifficulty] = useState(null); // "easy","normal","hard"

  var DIFF = {
    easy:   { obstacleRate: 140, oxygenDrain: 0.01, wrongPenalty: 10, hitPenalty: 3, oxygenBonus: 12, label: "쉬움" },
    normal: { obstacleRate: 80,  oxygenDrain: 0.02, wrongPenalty: 15, hitPenalty: 5, oxygenBonus: 8,  label: "보통" },
    hard:   { obstacleRate: 45,  oxygenDrain: 0.035, wrongPenalty: 20, hitPenalty: 8, oxygenBonus: 5,  label: "어려움" },
  };

  // Pick next question
  var nextQuestion = function() {
    var g = gameRef.current;
    if (g.usedQs.length >= DEEP_QS.length) g.usedQs = [];
    var idx;
    do { idx = Math.floor(Math.random() * DEEP_QS.length); } while (g.usedQs.indexOf(idx) >= 0);
    g.usedQs.push(idx);
    g.question = DEEP_QS[idx];
    g.qIdx = idx;
    g.bubbles = [];
    // Spawn emotion bubbles
    var all = [g.question.ans].concat(g.question.wrongs);
    for (var i = 0; i < all.length; i++) {
      g.bubbles.push({
        label: all[i],
        correct: all[i] === g.question.ans,
        x: 10 + Math.random() * 80,
        y: 50 + Math.random() * 40,
        dx: (Math.random() - 0.5) * 0.4,
        dy: -0.1 - Math.random() * 0.2,
        alive: true
      });
    }
  };

  // Spawn obstacle
  var spawnObstacle = function() {
    var g = gameRef.current;
    g.obstacles.push({
      x: Math.random() * 85 + 5,
      y: 105,
      type: Math.random() > 0.5 ? "rock" : "seaweed",
      w: 6 + Math.random() * 4,
    });
  };

  // Key handlers
  useEffect(function() {
    var onDown = function(e) {
      var g = gameRef.current; if (!g) return;
      if (e.key === "ArrowLeft" || e.key === "a") g.keys.left = true;
      if (e.key === "ArrowRight" || e.key === "d") g.keys.right = true;
      if (e.key === "ArrowUp" || e.key === "w") g.keys.up = true;
      if (e.key === "ArrowDown" || e.key === "s") g.keys.down = true;
    };
    var onUp = function(e) {
      var g = gameRef.current; if (!g) return;
      if (e.key === "ArrowLeft" || e.key === "a") g.keys.left = false;
      if (e.key === "ArrowRight" || e.key === "d") g.keys.right = false;
      if (e.key === "ArrowUp" || e.key === "w") g.keys.up = false;
      if (e.key === "ArrowDown" || e.key === "s") g.keys.down = false;
    };
    window.addEventListener("keydown", onDown);
    window.addEventListener("keyup", onUp);
    return function() { window.removeEventListener("keydown", onDown); window.removeEventListener("keyup", onUp); };
  }, []);

  // Touch handlers
  var onTouchStart = function(e) {
    var t = e.touches[0];
    var g = gameRef.current; if (!g) return;
    g.touchStartX = t.clientX;
    g.touchStartY = t.clientY;
  };
  var onTouchMove = function(e) {
    e.preventDefault();
    var t = e.touches[0];
    var g = gameRef.current; if (!g) return;
    if (g.touchStartX === null) return;
    var dx = t.clientX - g.touchStartX;
    var dy = t.clientY - g.touchStartY;
    g.keys.left = dx < -10; g.keys.right = dx > 10;
    g.keys.up = dy < -10; g.keys.down = dy > 10;
    g.touchStartX = t.clientX;
    g.touchStartY = t.clientY;
  };
  var onTouchEnd = function() {
    var g = gameRef.current; if (!g) return;
    g.keys = { left: false, right: false, up: false, down: false };
    g.touchStartX = null; g.touchStartY = null;
  };

  // Start game
  var startGame = function(diff) {
    if (diff) setDifficulty(diff);
    var d = diff || difficulty || "normal";
    gameRef.current = {
      diver: { x: 50, y: 20 }, depth: 0, maxDepth: 0, oxygen: 100,
      bubbles: [], obstacles: [], usedQs: [],
      question: null, qIdx: -1,
      state: "playing",
      keys: { left: false, right: false, up: false, down: false },
      spawnTimer: 0, obstacleTimer: 0,
      feedback: null, feedbackTimer: 0,
      touchStartX: null, touchStartY: null,
      score: 0, diff: d,
    };
    setDepth(0); setOxygen(100); setMaxDepth(0); setScore(0);
    setGameState("playing");
    nextQuestion();
  };

  // Game loop
  useEffect(function() {
    if (gameState !== "playing") return;
    var cv = canRef.current;
    if (!cv) return;
    var ctx = cv.getContext("2d");

    var loop = function() {
      try {
      var g = gameRef.current;
      if (!g || g.state !== "playing") return;
      var W = 380, H = 500;
      var dpr = window.devicePixelRatio || 1;
      var rect = cv.getBoundingClientRect();
      var bw = Math.max(1, Math.round(rect.width * dpr)), bh = Math.max(1, Math.round(rect.height * dpr));
      if (cv.width !== bw || cv.height !== bh) { cv.width = bw; cv.height = bh; }
      ctx.setTransform(cv.width / W, 0, 0, cv.height / H, 0, 0);
      ctx.clearRect(0, 0, W, H);

      // Move diver
      var speed = 1.8;
      if (g.keys.left) g.diver.x -= speed;
      if (g.keys.right) g.diver.x += speed;
      if (g.keys.up) g.diver.y -= speed * 0.7;
      if (g.keys.down) g.diver.y += speed * 0.7;
      g.diver.x = Math.max(5, Math.min(95, g.diver.x));
      g.diver.y = Math.max(5, Math.min(85, g.diver.y));

      // Increase depth over time
      g.depth += 0.5;
      g.maxDepth = Math.max(g.maxDepth, g.depth);

      // Slowly lose oxygen (based on difficulty)
      var dc = DIFF[g.diff || "normal"];
      g.oxygen -= dc.oxygenDrain;

      // Background - gets darker with depth
      var depthPct = Math.min(g.depth / 500, 1);
      var r1 = Math.round(147 - depthPct * 117), g1 = Math.round(197 - depthPct * 157), b1 = Math.round(253 - depthPct * 183);
      var r2 = Math.round(30 - depthPct * 20), g2 = Math.round(58 - depthPct * 38), b2 = Math.round(95 - depthPct * 35);
      var bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, "rgb(" + r1 + "," + g1 + "," + b1 + ")");
      bgGrad.addColorStop(1, "rgb(" + r2 + "," + g2 + "," + b2 + ")");
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Ambient bubbles
      for (var bi = 0; bi < 3; bi++) {
        var bx2 = (Math.sin(Date.now() * 0.001 + bi * 2) + 1) / 2 * W;
        var by2 = ((Date.now() * 0.03 + bi * 200) % H);
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath(); ctx.arc(bx2, H - by2, 3 + bi, 0, Math.PI * 2); ctx.fill();
      }

      // Depth lines
      for (var dl = 0; dl < 5; dl++) {
        var lineY = ((g.depth * 2 + dl * 120) % H);
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.beginPath(); ctx.moveTo(0, lineY); ctx.lineTo(W, lineY); ctx.stroke();
      }

      // Move & draw obstacles
      g.obstacleTimer += 1;
      var obsRate = dc.obstacleRate - Math.min(g.depth / 10, dc.obstacleRate * 0.4);
      if (g.obstacleTimer > obsRate) { spawnObstacle(); g.obstacleTimer = 0; }
      for (var oi = g.obstacles.length - 1; oi >= 0; oi--) {
        var ob = g.obstacles[oi];
        ob.y -= 0.6;
        if (ob.y < -10) { g.obstacles.splice(oi, 1); continue; }
        var ox = ob.x / 100 * W, oy = ob.y / 100 * H, ow = ob.w / 100 * W;
        if (ob.type === "rock") {
          ctx.fillStyle = "rgba(100,80,60," + (0.5 + depthPct * 0.3) + ")";
          ctx.beginPath(); ctx.arc(ox, oy, ow, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "rgba(80,60,40,0.3)";
          ctx.beginPath(); ctx.arc(ox - ow * 0.2, oy - ow * 0.2, ow * 0.6, 0, Math.PI * 2); ctx.fill();
        } else {
          ctx.fillStyle = "rgba(34,139,34," + (0.4 + depthPct * 0.2) + ")";
          for (var si = 0; si < 3; si++) {
            ctx.beginPath();
            ctx.ellipse(ox + si * 3 - 3, oy, 2, ow * 1.5, Math.sin(Date.now() * 0.003 + si) * 0.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        // Collision with diver
        var dx2 = (g.diver.x / 100 * W) - ox, dy2 = (g.diver.y / 100 * H) - oy;
        if (Math.sqrt(dx2 * dx2 + dy2 * dy2) < ow + 12) {
          g.oxygen -= dc.hitPenalty;
          g.obstacles.splice(oi, 1);
          g.feedback = { text: "부딪혔다!", ok: false };
          g.feedbackTimer = 30;
        }
      }

      // Move & draw emotion bubbles
      for (var ei = g.bubbles.length - 1; ei >= 0; ei--) {
        var eb = g.bubbles[ei];
        if (!eb.alive) continue;
        eb.x += eb.dx;
        eb.y += eb.dy;
        if (eb.x < 3 || eb.x > 97) eb.dx = -eb.dx;
        if (eb.y < 15) eb.dy = Math.abs(eb.dy);
        if (eb.y > 95) eb.dy = -Math.abs(eb.dy);

        var ex = eb.x / 100 * W, ey = eb.y / 100 * H;

        // Draw bubble
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = eb.correct ? "rgba(99,102,241,0.8)" : "rgba(200,200,200,0.6)";
        ctx.beginPath(); ctx.arc(ex, ey, 22, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Shine
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.arc(ex - 6, ey - 6, 6, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        // Label
        ctx.fillStyle = "#fff";
        ctx.font = "11px 'Gowun Dodum',system-ui";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(eb.label, ex, ey);

        // Collision with diver
        var ddx = (g.diver.x / 100 * W) - ex, ddy = (g.diver.y / 100 * H) - ey;
        if (Math.sqrt(ddx * ddx + ddy * ddy) < 32) {
          eb.alive = false;
          if (eb.correct) {
            g.score += 10;
            g.oxygen = Math.min(100, g.oxygen + dc.oxygenBonus);
            g.feedback = { text: "정답! +O2", ok: true };
            g.feedbackTimer = 40;
            // Next question
            setTimeout(nextQuestion, 600);
          } else {
            g.oxygen -= dc.wrongPenalty;
            g.feedback = { text: "오답! 산소 -15", ok: false };
            g.feedbackTimer = 40;
          }
        }
      }

      // Draw mascot character
      var px = g.diver.x / 100 * W, py = g.diver.y / 100 * H;
      // Bubble trail
      for (var bt = 0; bt < 3; bt++) {
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.beginPath(); ctx.arc(px + Math.sin(Date.now() * 0.005 + bt) * 6, py - 26 - bt * 10, 3 - bt * 0.5, 0, Math.PI * 2); ctx.fill();
      }
      // Draw mascot image
      try {
        if (DS_MASCOT && DS_MASCOT.complete && DS_MASCOT.naturalWidth > 0) {
          ctx.drawImage(DS_MASCOT, px - 24, py - 24, 48, 48);
        } else {
          ctx.fillStyle = "#fde68a"; ctx.beginPath(); ctx.arc(px, py, 20, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#1e293b"; ctx.font = "18px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("🤿", px, py);
        }
      } catch(e) {
        ctx.fillStyle = "#fde68a"; ctx.beginPath(); ctx.arc(px, py, 20, 0, Math.PI * 2); ctx.fill();
      }

      // Situation box at top
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(10, 6, W - 20, 58, 12);
      else ctx.rect(10, 6, W - 20, 58);
      ctx.fill();
      if (g.question) {
        ctx.fillStyle = "#a5f3fc";
        ctx.font = "bold 13px 'Gowun Dodum',system-ui";
        ctx.textAlign = "center";
        ctx.fillText(g.question.sit, W / 2, 27);
        if (g.question.feel) {
          ctx.fillStyle = "#fde68a";
          ctx.font = "12px 'Gowun Dodum',system-ui";
          ctx.fillText(g.question.feel, W / 2, 48);
        }
      }

      // HUD bottom (depth + oxygen only)
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(10, H - 46, W - 20, 38, 10);
      else ctx.rect(10, H - 46, W - 20, 38);
      ctx.fill();
      ctx.fillStyle = "#a5f3fc"; ctx.font = "13px 'Gowun Dodum',system-ui";
      ctx.textAlign = "left";
      ctx.fillText("깊이: " + Math.floor(g.depth) + "m", 22, H - 24);
      ctx.fillStyle = g.oxygen > 40 ? "#a5f3fc" : g.oxygen > 20 ? "#fbbf24" : "#fca5a5";
      ctx.textAlign = "right";
      ctx.fillText("O2: " + Math.round(g.oxygen) + "%", W - 22, H - 24);

      // Feedback
      if (g.feedbackTimer > 0) {
        g.feedbackTimer--;
        ctx.globalAlpha = Math.min(1, g.feedbackTimer / 15);
        ctx.fillStyle = g.feedback.ok ? "rgba(91,181,166,0.9)" : "rgba(224,112,112,0.9)";
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(W / 2 - 80, H / 2 - 18, 160, 36, 10);
        else ctx.rect(W / 2 - 80, H / 2 - 18, 160, 36);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "14px 'Gowun Dodum',system-ui";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(g.feedback.text, W / 2, H / 2);
        ctx.globalAlpha = 1;
      }

      // Update React state
      setDepth(Math.floor(g.depth));
      setOxygen(Math.round(g.oxygen));
      setScore(g.score);
      if (g.depth > g.maxDepth) { g.maxDepth = g.depth; setMaxDepth(Math.floor(g.depth)); }

      // Game over check
      if (g.oxygen <= 0) {
        g.state = "over";
        setGameState("over");
        return;
      }

      animRef.current = requestAnimationFrame(loop);
      } catch(err) { console.warn("Game loop error:", err); animRef.current = requestAnimationFrame(loop); }
    };
    animRef.current = requestAnimationFrame(loop);
    return function() { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [gameState]);

  // Idle
  if (gameState === "idle") return (
    <div style={{ textAlign: "center", padding: 20 }}>
      <div style={{ marginBottom: 12 }}><img src="diver.png" style={{ width: 72, height: 72 }} /></div>
      <h3 style={{ fontSize: 20, fontWeight: 400, fontFamily: "'Jua',sans-serif", margin: "0 0 8px" }}>깊은 바다 탐험</h3>
      <p style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.6, margin: "0 0 20px" }}>
        바다 깊이 내려가며 상황에 맞는 감정을 수집하세요!<br />
        잘못된 감정을 먹으면 산소가 줄어들어요.<br />
        장애물도 조심하세요!
      </p>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 20 }}>
        <div style={{ ...crd, padding: "14px 20px", textAlign: "center", maxWidth: 360 }}>
          <div style={{ fontSize: 14, color: "#1e293b" }}>방향키 혹은 터치로 이동하세요</div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
        <button onClick={function() { startGame("easy"); }} style={{ ...bPri, padding: "14px 24px", fontSize: 15, background: "#5bb5a6" }}><img src="clownfish.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />쉬움</button>
        <button onClick={function() { startGame("normal"); }} style={{ ...bPri, padding: "14px 24px", fontSize: 15 }}><img src="octopus.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />보통</button>
        <button onClick={function() { startGame("hard"); }} style={{ ...bPri, padding: "14px 24px", fontSize: 15, background: "#e07070" }}><img src="shark.png" style={{ width: 16, height: 16, verticalAlign: "middle", marginRight: 3 }} />어려움</button>
      </div>
      <div style={{ marginTop: 12 }}><button onClick={onBack} style={{ ...bSoft, fontSize: 12 }}>돌아가기</button></div>
    </div>
  );

  // Game over
  if (gameState === "over") {
    return (
      <div style={{ textAlign: "center", padding: 20 }}>
        <div style={{ fontSize: 56, marginBottom: 8 }}>🫧</div>
        <div style={{ fontSize: 18, color: "#475569", marginBottom: 12 }}>산소가 다 떨어졌어요!</div>
        <div style={{ fontSize: 14, color: "#6366f1", fontWeight: 400, marginBottom: 4 }}>최대 깊이</div>
        <div style={{ fontSize: 48, fontWeight: 400, color: "#1e293b" }}>{maxDepth}m</div>
        <div style={{ fontSize: 12, color: "#475569", marginBottom: 4 }}>난이도: {DIFF[difficulty || "normal"].label}</div>
        <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 20 }}>
          <button onClick={function() { startGame(difficulty); }} style={{ ...bPri, padding: "12px 28px" }}>다시 탐험</button>
          <button onClick={function() { setGameState("idle"); setDifficulty(null); }} style={{ ...bSoft, padding: "12px 20px" }}>난이도 변경</button>
          <button onClick={onBack} style={{ ...bSoft, padding: "12px 20px" }}>돌아가기</button>
        </div>
      </div>
    );
  }

  // Playing
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <button onClick={function() { gameRef.current.state = "over"; setGameState("over"); }} style={{ ...bSoft, padding: "4px 10px", fontSize: 11 }}>탐험 종료</button>
        <span style={{ fontSize: 12, color: "#475569" }}>방향키 또는 터치로 이동</span>
      </div>
      <canvas ref={canRef} width={380} height={500}
        style={{ width: "100%", maxWidth: 480, aspectRatio: "380 / 500", display: "block", margin: "0 auto", borderRadius: 16, touchAction: "none" }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      />
    </div>
  );
}

/* ═══════════ 2. Shell Emotion Matching Game ═══════════ */
var EMOTION_PAIRS = [
  ["행복", "즐거움"], ["슬픔", "우울"], ["분노", "짜증"], ["불안", "걱정"],
  ["피곤", "지침"], ["신남", "흥분"], ["만족", "편안"], ["희망", "기대"],

function ShellMatchGame({ onBack }) {
  var [cards, setCards] = useState([]);
  var [flipped, setFlipped] = useState([]);
  var [matched, setMatched] = useState([]);
  var [moves, setMoves] = useState(0);
  var [gameOver, setGameOver] = useState(false);
  var [difficulty, setDifficulty] = useState(null); // 4, 6, 8

  var initGame = function(pairs) {
    var picked = [];
    var shuffled = EMOTION_PAIRS.slice();
    for (var i = shuffled.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = t; }
    picked = shuffled.slice(0, pairs);
    var cardData = [];
    picked.forEach(function(pair, i) {
      cardData.push({ id: i * 2, pairId: i, text: pair[0] });
      cardData.push({ id: i * 2 + 1, pairId: i, text: pair[1] });
    });
    for (var k = cardData.length - 1; k > 0; k--) { var j2 = Math.floor(Math.random() * (k + 1)); var t2 = cardData[k]; cardData[k] = cardData[j2]; cardData[j2] = t2; }
    setCards(cardData);
    setFlipped([]); setMatched([]); setMoves(0); setGameOver(false);
  };

  var flipCard = function(id) {
    if (flipped.length >= 2 || flipped.indexOf(id) >= 0 || matched.indexOf(id) >= 0) return;
    var newFlipped = flipped.concat(id);
    setFlipped(newFlipped);
    if (newFlipped.length === 2) {
      setMoves(function(m) { return m + 1; });
      var c1 = cards.find(function(c) { return c.id === newFlipped[0]; });
      var c2 = cards.find(function(c) { return c.id === newFlipped[1]; });
      if (c1.pairId === c2.pairId && c1.id !== c2.id) {
        setTimeout(function() {
          var newMatched = matched.concat(newFlipped);
          setMatched(newMatched);
          setFlipped([]);
          if (newMatched.length === cards.length) setGameOver(true);
        }, 400);
      } else {
        setTimeout(function() { setFlipped([]); }, 700);
      }
    }
  };

  // Difficulty select
  if (!difficulty) return (
    <div style={{ textAlign: "center", padding: 20 }}>
      <div style={{ marginBottom: 12 }}><img src="conch.png" style={{ width: 72, height: 72 }} /></div>
      <h3 style={{ fontSize: 20, fontWeight: 400, fontFamily: "'Jua',sans-serif", margin: "0 0 8px" }}>감정 조개 매칭</h3>
      <p style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.6, margin: "0 0 20px" }}>
        비슷한 감정 단어끼리 짝을 맞춰보세요!<br />
        행복 ↔ 즐거움, 슬픔 ↔ 우울 ...
      </p>
      <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
        <button onClick={function() { setDifficulty(4); initGame(4); }} style={{ ...bPri, padding: "14px 24px", background: "#5bb5a6" }}>쉬움 (4짝)</button>
        <button onClick={function() { setDifficulty(6); initGame(6); }} style={{ ...bPri, padding: "14px 24px" }}>보통 (6짝)</button>
        <button onClick={function() { setDifficulty(8); initGame(8); }} style={{ ...bPri, padding: "14px 24px", background: "#8b5cf6" }}>어려움 (8짝)</button>
      </div>
      <div style={{ marginTop: 12 }}><button onClick={onBack} style={{ ...bSoft, fontSize: 12 }}>돌아가기</button></div>
    </div>
  );

  if (gameOver) {
    var stars = moves <= difficulty * 2 ? 3 : moves <= difficulty * 3 ? 2 : 1;
    return (
      <div style={{ textAlign: "center", padding: 20 }}>
        <div style={{ marginBottom: 8 }}><img src="conch.png" style={{ width: 56, height: 56 }} /></div>
        <div style={{ fontSize: 32, color: "#f59e0b" }}>{"⭐".repeat(stars)}</div>
        <div style={{ fontSize: 16, fontWeight: 600, color: "#1e293b", margin: "8px 0" }}>모든 조개를 찾았어요!</div>
        <div style={{ fontSize: 13, color: "#475569" }}>{moves}번 시도</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", margin: "12px 0 20px" }}>
          {EMOTION_PAIRS.slice(0, difficulty).map(function(p, i) {
            return <span key={i} style={{ padding: "4px 10px", borderRadius: 10, background: "#eef2ff", color: "#6366f1", fontSize: 11 }}>{p[0]} = {p[1]}</span>;
          })}
        </div>
        <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
          <button onClick={function() { initGame(difficulty); }} style={{ ...bPri, padding: "12px 24px" }}>다시 도전</button>
          <button onClick={function() { setDifficulty(null); }} style={{ ...bSoft, padding: "12px 24px" }}>난이도 변경</button>
          <button onClick={onBack} style={{ ...bSoft, padding: "12px 24px" }}>돌아가기</button>
        </div>
      </div>
    );
  }

  var cols = difficulty >= 8 ? 4 : difficulty >= 6 ? 4 : 4; // 8장→4×2, 12장→4×3, 16장→4×4
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <button onClick={onBack} style={{ ...bSoft, padding: "4px 10px", fontSize: 11 }}>← 뒤로</button>
        <div style={{ fontSize: 13, fontWeight: 500 }}>시도: {moves}회</div>
        <div style={{ fontSize: 13, color: "#475569" }}>{matched.length / 2}/{cards.length / 2} 짝</div>
      </div>
      <div style={{ textAlign: "center", fontSize: 12, color: "#475569", marginBottom: 10 }}>비슷한 감정 단어 짝을 찾아보세요!</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(" + cols + ", 1fr)", gap: 8, maxWidth: 460, margin: "0 auto" }}>
        {cards.map(function(c) {
          var isFlipped = flipped.indexOf(c.id) >= 0;
          var isMatched = matched.indexOf(c.id) >= 0;
          var show = isFlipped || isMatched;
          return (
            <div key={c.id} onClick={function() { flipCard(c.id); }}
              style={{ aspectRatio: "3/4", display: "flex", alignItems: "center", justifyContent: "center", padding: 6, borderRadius: 14, cursor: show ? "default" : "pointer", fontSize: 13, fontWeight: 500, textAlign: "center", lineHeight: 1.3, transition: "all 0.3s", userSelect: "none",
                background: isMatched ? "#eef7f4" : show ? "#eef2ff" : "linear-gradient(135deg, #c7d2fe, #a5b4fc)",
                border: isMatched ? "2px solid #5bb5a6" : show ? "2px solid #6366f1" : "2px solid transparent",
                color: isMatched ? "#5bb5a6" : show ? "#6366f1" : "transparent",
                boxShadow: show ? "none" : "0 2px 8px rgba(99,102,241,0.2)",
                transform: show ? "rotateY(0)" : "rotateY(0)" }}>
              {show ? c.text : "🐚"}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════ 3. Ocean Merge Game (Suika-style) ═══════════ */
var SEA_LEVELS = [
  { name: "거품", r: 12, color: "#e0f7fa", stroke: "#b2ebf2", emoji: "°", emo: "짜증" },
  { name: "조개", r: 16, color: "#f8bbd0", stroke: "#f48fb1", emoji: "🐚", emo: "걱정" },
  { name: "새우", r: 20, color: "#ffccbc", stroke: "#ff8a65", emoji: "🦐", emo: "설렘" },
  { name: "물고기", r: 25, color: "#ffe0b2", stroke: "#ffb74d", emoji: "🐟", emo: "슬픔" },
  { name: "해파리", r: 30, color: "#e1bee7", stroke: "#ba68c8", emoji: "🎐", emo: "분노" },
  { name: "불가사리", r: 35, color: "#fff9c4", stroke: "#ffd54f", emoji: "⭐", emo: "희망" },
  { name: "거북이", r: 40, color: "#c8e6c9", stroke: "#81c784", emoji: "🐢", emo: "감사" },
  { name: "문어", r: 46, color: "#ffcdd2", stroke: "#ef9a9a", emoji: "🐙", emo: "자부심" },
  { name: "돌고래", r: 52, color: "#bbdefb", stroke: "#64b5f6", emoji: "🐬", emo: "평온" },
  { name: "고래", r: 60, color: "#b3e5fc", stroke: "#4fc3f7", emoji: "🐋", emo: "행복" },
];


function OceanMergeGame({ onBack }) {
  var canRef = useRef(null);
  var gameRef = useRef(null);
  var animRef = useRef(null);
  var [score, setScore] = useState(0);
  var [gameState, setGameState] = useState("idle");
  var [nextLevel, setNextLevel] = useState(0);
  var [bestScore, setBestScore] = useState(0);

  var W = 300, H = 450;
  var WALL_Y = 60; // game over line

  var initGame = function() {
    gameRef.current = {
      balls: [],
      nextLv: Math.floor(Math.random() * 4),
      dropX: W / 2,
      state: "ready", // ready, dropping, over
      score: 0,
      merging: [], // flash effects
    };
    setScore(0);
    setNextLevel(gameRef.current.nextLv);
    setGameState("playing");
  };

  // Physics step
  var step = function(g) {
    var gravity = 0.25;
    var friction = 0.99;
    var bounce = 0.4;
    var wallL = 10, wallR = W - 10, wallB = H - 10;

    for (var i = 0; i < g.balls.length; i++) {
      var b = g.balls[i];
      if (b.dead) continue;
      b.vy += gravity;
      b.vx *= friction;
      b.vy *= friction;
      b.x += b.vx;
      b.y += b.vy;

      // Wall collisions
      if (b.x - b.r < wallL) { b.x = wallL + b.r; b.vx = Math.abs(b.vx) * bounce; }
      if (b.x + b.r > wallR) { b.x = wallR - b.r; b.vx = -Math.abs(b.vx) * bounce; }
      if (b.y + b.r > wallB) { b.y = wallB - b.r; b.vy = -Math.abs(b.vy) * bounce; }
    }

    // Ball-ball collisions
    for (var i = 0; i < g.balls.length; i++) {
      if (g.balls[i].dead) continue;
      for (var j = i + 1; j < g.balls.length; j++) {
        if (g.balls[j].dead) continue;
        var a = g.balls[i], b2 = g.balls[j];
        var dx = b2.x - a.x, dy = b2.y - a.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var minD = a.r + b2.r;
        if (dist < minD && dist > 0) {
          // Same level? Merge!
          if (a.lv === b2.lv && a.lv < SEA_LEVELS.length - 1) {
            var nx = (a.x + b2.x) / 2, ny = (a.y + b2.y) / 2;
            a.dead = true;
            b2.dead = true;
            var newLv = a.lv + 1;
            var nl = SEA_LEVELS[newLv];
            g.balls.push({ x: nx, y: ny, vx: 0, vy: -1, r: nl.r, lv: newLv, dead: false });
            g.score += (newLv + 1) * 10;
            g.merging.push({ x: nx, y: ny, r: nl.r, timer: 15 });
          } else {
            // Push apart
            var nx2 = dx / dist, ny2 = dy / dist;
            var overlap = minD - dist;
            var push = overlap / 2;
            a.x -= nx2 * push;
            a.y -= ny2 * push;
            b2.x += nx2 * push;
            b2.y += ny2 * push;
            // Transfer velocity
            var dvx = b2.vx - a.vx, dvy = b2.vy - a.vy;
            var dvn = dvx * nx2 + dvy * ny2;
            if (dvn < 0) {
              a.vx += dvn * nx2 * 0.5;
              a.vy += dvy * ny2 * 0.5;
              b2.vx -= dvn * nx2 * 0.5;
              b2.vy -= dvn * ny2 * 0.5;
            }
          }
        }
      }
    }

    // Remove dead balls
    g.balls = g.balls.filter(function(b) { return !b.dead; });

    // Check game over (ball above line for a while)
    for (var i = 0; i < g.balls.length; i++) {
      if (g.balls[i].y - g.balls[i].r < WALL_Y && g.balls[i].vy < 0.5 && g.balls[i].vy > -0.5) {
        if (!g.balls[i].overTimer) g.balls[i].overTimer = 0;
        g.balls[i].overTimer++;
        if (g.balls[i].overTimer > 60) {
          g.state = "over";
          return;
        }
      } else {
        g.balls[i].overTimer = 0;
      }
    }
  };

  // Drop a new ball
  var drop = function() {
    var g = gameRef.current;
    if (!g || g.state !== "ready") return;
    var lv = g.nextLv;
    var sl = SEA_LEVELS[lv];
    g.balls.push({ x: g.dropX, y: WALL_Y - 10, vx: 0, vy: 0, r: sl.r, lv: lv, dead: false });
    g.state = "dropping";
    g.nextLv = Math.floor(Math.random() * 4);
    setNextLevel(g.nextLv);
    // Allow next drop after delay
    setTimeout(function() { if (g.state === "dropping") g.state = "ready"; }, 500);
  };

  // Mouse/touch position
  var updateDropX = function(clientX, canvas) {
    var g = gameRef.current;
    if (!g || g.state === "over") return;
    var rect = canvas.getBoundingClientRect();
    var scale = W / rect.width;
    g.dropX = Math.max(20, Math.min(W - 20, (clientX - rect.left) * scale));
  };

  // Game loop
  useEffect(function() {
    if (gameState !== "playing") return;
    var cv = canRef.current;
    if (!cv) return;
    var ctx = cv.getContext("2d");
    var dpr = window.devicePixelRatio || 1;

    var loop = function() {
      var g = gameRef.current;
      if (!g) return;

      var rect = cv.getBoundingClientRect();
      var bw = Math.max(1, Math.round(rect.width * dpr)), bh = Math.max(1, Math.round(rect.height * dpr));
      if (cv.width !== bw || cv.height !== bh) { cv.width = bw; cv.height = bh; }
      ctx.setTransform(cv.width / W, 0, 0, cv.height / H, 0, 0);
      ctx.clearRect(0, 0, W, H);

      // Physics
      if (g.state !== "over") step(g);

      // Background - ocean gradient
      var bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, "#e0f7fa");
      bg.addColorStop(0.3, "#80deea");
      bg.addColorStop(1, "#006064");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // Container walls
      ctx.strokeStyle = "rgba(255,255,255,0.4)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(10, WALL_Y);
      ctx.lineTo(10, H - 10);
      ctx.lineTo(W - 10, H - 10);
      ctx.lineTo(W - 10, WALL_Y);
      ctx.stroke();

      // Game over line
      ctx.strokeStyle = "rgba(255,100,100,0.3)";
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(10, WALL_Y);
      ctx.lineTo(W - 10, WALL_Y);
      ctx.stroke();
      ctx.setLineDash([]);

      // Ambient bubbles
      for (var bi = 0; bi < 5; bi++) {
        var bx = (Math.sin(Date.now() * 0.0008 + bi * 1.5) + 1) / 2 * W;
        var by = H - ((Date.now() * 0.02 + bi * 100) % H);
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath();
        ctx.arc(bx, by, 2 + bi * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw drop guide
      if (g.state === "ready") {
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.setLineDash([3, 6]);
        ctx.beginPath();
        ctx.moveTo(g.dropX, WALL_Y - 20);
        ctx.lineTo(g.dropX, H - 10);
        ctx.stroke();
        ctx.setLineDash([]);

        // Preview ball
        var psl = SEA_LEVELS[g.nextLv];
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = psl.color;
        ctx.beginPath(); ctx.arc(g.dropX, WALL_Y - 10, psl.r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.font = (psl.r * 0.9) + "px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(psl.emoji, g.dropX, WALL_Y - 10);
      }

      // Draw balls
      for (var i = 0; i < g.balls.length; i++) {
        var b = g.balls[i];
        var sl = SEA_LEVELS[b.lv];
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.beginPath();
        ctx.ellipse(b.x, b.y + b.r * 0.8, b.r * 0.8, b.r * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        // Ball body
        var grad = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, 0, b.x, b.y, b.r);
        grad.addColorStop(0, "#fff");
        grad.addColorStop(0.3, sl.color);
        grad.addColorStop(1, sl.stroke);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = sl.stroke;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Emoji + Emotion word
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (b.r >= 20) {
          ctx.font = (b.r * 0.7) + "px sans-serif";
          ctx.fillText(sl.emoji, b.x, b.y - b.r * 0.15);
          ctx.fillStyle = "#333"; ctx.font = "bold " + Math.max(8, b.r * 0.32) + "px 'Gowun Dodum',system-ui";
          ctx.fillText(sl.emo, b.x, b.y + b.r * 0.4);
        } else if (b.r >= 16) {
          ctx.font = (b.r * 0.7) + "px sans-serif";
          ctx.fillText(sl.emoji, b.x, b.y - 2);
          ctx.fillStyle = "#333"; ctx.font = "bold 7px 'Gowun Dodum',system-ui";
          ctx.fillText(sl.emo, b.x, b.y + b.r * 0.55);
        } else {
          ctx.fillStyle = "#555"; ctx.font = "bold 7px 'Gowun Dodum',system-ui";
          ctx.fillText(sl.emo, b.x, b.y);
        }
      }

      // Merge flash effects
      for (var mi = g.merging.length - 1; mi >= 0; mi--) {
        var m = g.merging[mi];
        m.timer--;
        if (m.timer <= 0) { g.merging.splice(mi, 1); continue; }
        ctx.globalAlpha = m.timer / 15;
        ctx.strokeStyle = "#ffd54f";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r + 10 - m.timer * 0.5, 0, Math.PI * 2);
        ctx.stroke();
        // Sparkles
        for (var si = 0; si < 4; si++) {
          var sa = (si / 4) * Math.PI * 2 + Date.now() * 0.01;
          var sr = m.r + 15 - m.timer;
          ctx.fillStyle = "#ffd54f";
          ctx.beginPath();
          ctx.arc(m.x + Math.cos(sa) * sr, m.y + Math.sin(sa) * sr, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // HUD
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      if (ctx.roundRect) ctx.roundRect(8, 4, W - 16, 30, 8);
      else ctx.rect(8, 4, W - 16, 30);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 13px 'Gowun Dodum',system-ui";
      ctx.textAlign = "left";
      ctx.fillText("점수: " + g.score, 18, 23);
      // Next preview
      ctx.textAlign = "right";
      ctx.fillText("다음: " + SEA_LEVELS[g.nextLv].emoji + " " + SEA_LEVELS[g.nextLv].emo, W - 18, 23);

      // Update score
      setScore(g.score);

      if (g.state === "over") {
        setGameState("over");
        if (g.score > bestScore) setBestScore(g.score);
        return;
      }

      animRef.current = requestAnimationFrame(loop);
    };

    animRef.current = requestAnimationFrame(loop);
    return function() { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [gameState]);

  if (gameState === "idle") return (
    <div style={{ textAlign: "center", padding: 20 }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>🐙</div>
      <h3 style={{ fontSize: 20, fontWeight: 600, fontFamily: "'Jua',sans-serif", margin: "0 0 8px" }}>바다 생물 합치기</h3>
      <p style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.6, margin: "0 0 16px" }}>
        같은 감정끼리 합치면 더 큰 바다 생물로 진화!<br />
        다양한 감정 단어를 배우며 🐋 고래를 만들어보세요!
      </p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", marginBottom: 20 }}>
        {SEA_LEVELS.map(function(sl, i) {
          return <span key={i} style={{ padding: "4px 10px", borderRadius: 20, background: sl.color, border: "1px solid " + sl.stroke, fontSize: 12 }}>{sl.emoji} {sl.emo}</span>;
        })}
      </div>
      <button onClick={initGame} style={{ ...bPri, padding: "14px 40px", fontSize: 16 }}>시작!</button>
      {bestScore > 0 && <p style={{ fontSize: 12, color: "#475569", marginTop: 8 }}>최고 점수: {bestScore}</p>}
      <div style={{ marginTop: 12 }}><button onClick={onBack} style={{ ...bSoft, fontSize: 12 }}>돌아가기</button></div>
    </div>
  );

  if (gameState === "over") return (
    <div style={{ textAlign: "center", padding: 20 }}>
      <div style={{ fontSize: 48, marginBottom: 8 }}>🌊</div>

/* ═══════════ Donut Chart ═══════════ */
function DonutChart({ data, title, emptyText }) {
  var cRef = useRef(null);
  var sz = 140;
  useEffect(function() {
    var cv = cRef.current; if (!cv || !data || data.length === 0) return;
    var dpr = window.devicePixelRatio || 1;
    cv.width = sz * dpr; cv.height = sz * dpr;
    var c = cv.getContext("2d"); c.scale(dpr, dpr);
    c.clearRect(0, 0, sz, sz);
    var cx = sz / 2, cy = sz / 2, R = 58, r = 36;
    var total = data.reduce(function(s, d) { return s + d.count; }, 0);
    if (total === 0) return;
    var angle = -Math.PI / 2;
    data.forEach(function(d, i) {
      var slice = (d.count / total) * Math.PI * 2;
      c.beginPath();
      c.arc(cx, cy, R, angle, angle + slice);
      c.arc(cx, cy, r, angle + slice, angle, true);
      c.closePath();
      c.globalAlpha = 0.65;
      c.fillStyle = d.color || "#6366f1";
      c.fill();
      c.globalAlpha = 1;
      angle += slice;
    });
  }, [data, sz]);

  if (!data || data.length === 0) return (
    <div style={{ textAlign: "center", padding: 20, color: "#cbd5e1", fontSize: 13 }}>{emptyText || "데이터 없음"}</div>
  );
  return (
    <div>
      <div style={{ fontSize: 13, fontWeight: 500, color: "#1e293b", marginBottom: 10 }}>{title}</div>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
        <canvas ref={cRef} style={{ width: sz, height: sz }} />
        <div style={{ display: "flex", flexWrap: "wrap", gap: "6px 14px", justifyContent: "center", width: "100%" }}>
          {data.slice(0, 10).map(function(d, i) {
            return (
              <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: d.color || "#6366f1", opacity: 0.7, flexShrink: 0 }} />
                <span style={{ color: "#475569", fontWeight: 400, whiteSpace: "nowrap" }}>{d.label}</span>
                <span style={{ color: "#475569", whiteSpace: "nowrap" }}>{d.count}회</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════ Simple Word Cloud ═══════════ */
function SimpleWordCloud({ words, color }) {
  var cRef = useRef(null);
  var W = 280, H = 140;
  useEffect(function() {
    var cv = cRef.current; if (!cv || !words || words.length === 0) return;
    var dpr = window.devicePixelRatio || 1;
    cv.width = W * dpr; cv.height = H * dpr;
    var c = cv.getContext("2d"); c.scale(dpr, dpr);
    c.clearRect(0, 0, W, H);
    c.fillStyle = "#fafbfc"; c.fillRect(0, 0, W, H);
    var maxCount = words[0] ? words[0].count : 1;
    var placed = [];
    words.slice(0, 20).forEach(function(w) {
      var fontSize = Math.max(11, Math.min(28, 10 + (w.count / maxCount) * 20));
      c.font = "600 " + fontSize + "px 'Gowun Dodum',system-ui";
      var tw = c.measureText(w.word).width;
      var attempts = 0;
      var x, y, ok;
      do {
        x = Math.random() * (W - tw - 10) + 5;
        y = Math.random() * (H - fontSize - 10) + fontSize + 5;
        ok = true;
        for (var pi = 0; pi < placed.length; pi++) {
          var p = placed[pi];
          if (x < p.x + p.w + 4 && x + tw + 4 > p.x && y - fontSize < p.y && y > p.y - p.h) {
            ok = false; break;
          }
        }
        attempts++;
      } while (!ok && attempts < 50);
      if (ok || attempts >= 50) {
        var alpha = 0.5 + (w.count / maxCount) * 0.5;
        c.fillStyle = color || "#6366f1";
        c.globalAlpha = alpha;
        c.font = "600 " + fontSize + "px 'Gowun Dodum',system-ui";
        c.textBaseline = "bottom";
        c.fillText(w.word, x, y);
        c.globalAlpha = 1;
        placed.push({ x: x, y: y, w: tw, h: fontSize });
      }
    });
  }, [words, color, W, H]);

  if (!words || words.length === 0) return (
    <div style={{ padding: 16, color: "#cbd5e1", fontSize: 12, textAlign: "center" }}>관련 키워드 없음</div>
  );
  return <canvas ref={cRef} style={{ width: W, height: H, maxWidth: "100%", borderRadius: 10, border: "1px solid #f1f5f9" }} />;
}

/* ═══════════ Situation Extraction (sentence structure) ═══════════ */
// Korean causal/reason connectors: the clause BEFORE these = situation
var CAUSAL_ENDINGS = [
  "아서","어서","여서","해서","라서","이라서",
  "니까","으니까","니깐","으니깐",
  "때문에","때문",
  "덕분에","덕분",
  "다가","하다가",
  "하니","하니까",
  "는데","ㄴ데","은데","인데",
  "다보니","하다보니",
  "느라","하느라",
  "길래","기에","므로","이므로",
  "탓에","탓",
];
// Time/condition markers
var TIME_ENDINGS = ["할때","할 때","했을때","했을 때","하면","으면","되면"];
// Clean up extracted situations
var SIT_STOP = new Set(["그래서","그런데","하지만","그리고","근데","그래도","그러면","그럼","나는","나도","내가","저는","제가","오늘","어제","내일","진짜","정말","너무","매우","아주","완전","엄청","약간","조금"]);

// Helper: check if text contains emotion words
/* ═══════════ Situation Extraction (category-based) ═══════════ */
function extractSituations(textArray) {
  var sitFreq = {};
  textArray.forEach(function(text) {
    var norm = normalizeKorean(text);
    var tokens = norm.split(" ").filter(Boolean);
    var matched = new Set();
    for (var si = 0; si < SITUATION_MAP.length; si++) {
      var sit = SITUATION_MAP[si];
      for (var ti = 0; ti < tokens.length; ti++) {
        var tok = tokens[ti];
        var st = stemKorean(tok);
        for (var ki = 0; ki < sit.kw.length; ki++) {
          if (tok.includes(sit.kw[ki]) || st.includes(stemKorean(sit.kw[ki]))) {
            if (!matched.has(sit.ctx)) {
              matched.add(sit.ctx);
              sitFreq[sit.ctx] = (sitFreq[sit.ctx] || 0) + 1;
            }
            break;
          }
        }
      }
    }
  });
  return Object.entries(sitFreq).sort(function(a, b) { return b[1] - a[1]; }).map(function(e) { return { text: e[0], count: e[1] }; });
}

/* ═══════════ Date Helpers ═══════════ */
function fmtDate(d) { return (d.getMonth() + 1) + "." + d.getDate(); }
function nextDay(dateStr) {
  // Parse "M.D" format and return next day
  const parts = dateStr.split(".");
  if (parts.length < 2) return dateStr;
  const now = new Date();
  const m = parseInt(parts[0]) - 1;
  const d = parseInt(parts[1]);
  const date = new Date(now.getFullYear(), m, d);
  date.setDate(date.getDate() + 1);
  return fmtDate(date);
}
function todayStr() { return fmtDate(new Date()); }

/* ═══════════ DiaryView ═══════════ */
function DiaryView({ entries, setEntries, save, readOnly, userId }) {
  const [date, setDate] = useState(todayStr);
  const [text, setText] = useState("");
  const [tab, setTab] = useState(readOnly ? "change" : "input");
  const [hovIdx, setHovIdx] = useState(null);
  const [lastR, setLastR] = useState(null);
  const [showEmoFix, setShowEmoFix] = useState(false);
  const [fixedEmos, setFixedEmos] = useState([]);
  const [fontScale, setFontScale] = useState(1); // 0.85, 1, 1.2
  const [preEmos, setPreEmos] = useState([]); // pre-selected emotions
  const [preSits, setPreSits] = useState([]); // pre-selected situations
  const [showHelper, setShowHelper] = useState(false);

  // Suggestion flow state
  const [pending, setPending] = useState(null); // { text, date, situations, suggestions }
  const [customEmo, setCustomEmo] = useState(""); // custom emotion text input
  const [showCustom, setShowCustom] = useState(false); // toggle custom input
  const [privacy, setPrivacy] = useState(1); // 1 = fully visible, 0.05 = nearly hidden

  // Date range filter for analysis tab
  const [rangeMode, setRangeMode] = useState("all"); // "7", "30", "all", "custom"
  const [rangeStart, setRangeStart] = useState("");
  const [rangeEnd, setRangeEnd] = useState("");

  // Parse "M.D" to comparable number (M*100+D)
  var parseDate = function(ds) {
    var p = String(ds).split(".");
    if (p.length < 2) return 0;
    return parseInt(p[0]) * 100 + parseInt(p[1]);
  };
  // "YYYY-MM-DD"(달력) 또는 "M.D"(일기) → M*100+D, 실패 시 null
  var toMD = function(ds) {
    ds = String(ds).trim();
    if (!ds) return null;
    if (ds.indexOf("-") >= 0) { var a = ds.split("-"); var m = parseInt(a[1], 10), dd = parseInt(a[a.length - 1], 10); return (isNaN(m) || isNaN(dd)) ? null : m * 100 + dd; }
    var p = ds.split("."); if (p.length < 2) return null; var m2 = parseInt(p[0], 10), d2 = parseInt(p[1], 10); return (isNaN(m2) || isNaN(d2)) ? null : m2 * 100 + d2;
  };

  // Filter entries by date range
  var filteredEntries = useMemo(function() {
    if (!entries.length) return [];
    if (rangeMode === "all") return entries;
    if (rangeMode === "custom" && rangeStart && rangeEnd) {
      var s = toMD(rangeStart), e = toMD(rangeEnd);
      if (s === null || e === null) return entries;
      if (s > e) { var tmp = s; s = e; e = tmp; } // 순서 뒤바뀜 자동 보정
      return entries.filter(function(en) { var d = toMD(en.date); return d !== null && d >= s && d <= e; });
    }
    if (rangeMode === "7" || rangeMode === "30") {
      var count = parseInt(rangeMode);
      return entries.slice(-count);
    }
    return entries;
  }, [entries, rangeMode, rangeStart, rangeEnd]);

  // Emotion analysis for filtered entries
  var emotionAnalysis = useMemo(function() {
    if (!filteredEntries.length) return { posTop: [], negTop: [], posTexts: {}, negTexts: {} };
    var posFreq = {}, negFreq = {}, posTexts = {}, negTexts = {};
    filteredEntries.forEach(function(en) {
      var a = en.analysis;
      // Russell hits
      (a.hits || []).forEach(function(h) {
        if (h.val9 > 5) {
          posFreq[h.label] = (posFreq[h.label] || 0) + 1;
          if (!posTexts[h.label]) posTexts[h.label] = [];
          posTexts[h.label].push(en.text);
        } else if (h.val9 < 5) {
          negFreq[h.label] = (negFreq[h.label] || 0) + 1;
          if (!negTexts[h.label]) negTexts[h.label] = [];
          negTexts[h.label].push(en.text);
        }
      });
      // Extended positive
      (a.matchedPos || []).forEach(function(m) {
        var lb = "+" + m.word;
        posFreq[lb] = (posFreq[lb] || 0) + 1;
        if (!posTexts[lb]) posTexts[lb] = [];
        posTexts[lb].push(en.text);
      });
      // Extended negative
      (a.matchedNeg || []).forEach(function(m) {
        var lb = "-" + m.word;
        negFreq[lb] = (negFreq[lb] || 0) + 1;
        if (!negTexts[lb]) negTexts[lb] = [];
        negTexts[lb].push(en.text);
      });
    });
    var posColors = ["#5bb5a6","#34d399","#6ee7b7","#b8e6d8","#d1fae5","#059669","#047857","#065f46","#14b8a6","#0d9488"];
    var negColors = ["#e07070","#ef4444","#f87171","#fca5a5","#fecaca","#dc2626","#b91c1c","#991b1b","#e11d48","#be123c"];
    var posTop = Object.entries(posFreq).sort(function(a,b){return b[1]-a[1];}).slice(0,10).map(function(e,i){return{label:e[0],count:e[1],color:posColors[i%posColors.length]};});
    var negTop = Object.entries(negFreq).sort(function(a,b){return b[1]-a[1];}).slice(0,10).map(function(e,i){return{label:e[0],count:e[1],color:negColors[i%negColors.length]};});
    // Merge all texts for positive/negative situations
    var allPosTexts = [];
    Object.keys(posTexts).forEach(function(k) { allPosTexts = allPosTexts.concat(posTexts[k]); });
    var allNegTexts = [];
    Object.keys(negTexts).forEach(function(k) { allNegTexts = allNegTexts.concat(negTexts[k]); });
    var posSituations = extractSituations(allPosTexts);
    var negSituations = extractSituations(allNegTexts);
    return { posTop: posTop, negTop: negTop, posSituations: posSituations, negSituations: negSituations };
  }, [filteredEntries]);

  const advanceDate = useCallback((savedEntries, usedDate) => {
    const today = todayStr();
    if (usedDate === today) { setDate(nextDay(today)); }
    else { setDate(nextDay(usedDate)); }
  }, []);

  // Core save function (always saves)
  const doSave = useCallback((entryText, entryDate) => {
    const analysis = analyzeEntry(entryText);
    const ne = { date: entryDate, text: entryText, analysis, ts: Date.now() + Math.random() };
    const u = [...entries, ne];
    setEntries(u); save(u); setLastR(ne); setText(""); setPending(null);
    advanceDate(u, entryDate);
  }, [entries, tab, setEntries, save, advanceDate]);

  // Main add: check for emotions, if none found check situations
  const add = useCallback(() => {
    if (readOnly) return;
    const rawText = text.trim();
    // Allow save with just emotion selection (no text required)
    if (!rawText && preEmos.length === 0) return;

    const parts = rawText.split(/\s+/);
    const hasD = parts.length > 1 && /^\d+\.?\d*$/.test(parts[0]);
    const entryDate = hasD ? parts[0] : date.trim();
    const entryText = hasD ? parts.slice(1).join(" ") : rawText;

    // Build text with situation context if selected
    var fullText = entryText;
    if (preSits.length > 0 && !entryText) {
      fullText = preSits.join(", ") + " 상황";
    }

    // Run analysis
    const analysis = analyzeEntry(fullText || "");

    // Merge pre-selected emotions into analysis
    if (preEmos.length > 0) {
      for (var pi = 0; pi < preEmos.length; pi++) {
        var eName = preEmos[pi];
        if (!analysis.hits.some(function(h) { return h.name === eName; })) {
          var emo = EMOTIONS_28.find(function(e) { return e.name === eName; });
          if (emo) {
            analysis.hits.push({ name: emo.name, label: emo.label, q: emo.q, val9: emo.val, aro9: emo.aro, valStd: ((emo.val-1)/8)*2-1, aroStd: ((emo.aro-1)/8)*2-1, token: "직접선택" });
          }
        }
      }
      // Recalculate pos/neg percentages
      var pHits = analysis.hits.filter(function(h) { return h.val9 >= 6; }).length;
      var nHits = analysis.hits.filter(function(h) { return h.val9 < 5; }).length;
      var total = pHits + nHits + analysis.matchedPos.length + analysis.matchedNeg.length;
      if (total > 0) {
        analysis.posPct = ((pHits + analysis.matchedPos.length) / total) * 100;
        analysis.negPct = ((nHits + analysis.matchedNeg.length) / total) * 100;
      }
    }

    const hasEmotion = analysis.hits.length > 0 || analysis.matchedPos.length > 0 || analysis.matchedNeg.length > 0;

    if (hasEmotion) {
      doSave(fullText || preSits.join(", "), entryDate);
      setPreEmos([]); setPreSits([]);
    } else {
      const situations = detectSituations(fullText);
      if (situations.length > 0) {
        const suggestions = getSuggestions(situations);
        setPending({ text: fullText, date: entryDate, situations, suggestions, contextLabel: situations.map(s => s.ctx).join(", ") });
      } else {
        const genericSuggestions = [
          EMOTIONS_28.find(e => e.name === "happy"), EMOTIONS_28.find(e => e.name === "sad"),
          EMOTIONS_28.find(e => e.name === "angry"), EMOTIONS_28.find(e => e.name === "anxious"),
          EMOTIONS_28.find(e => e.name === "tired"), EMOTIONS_28.find(e => e.name === "calm"),
          EMOTIONS_28.find(e => e.name === "excited"), EMOTIONS_28.find(e => e.name === "lonely"),
        ].filter(Boolean);
        setPending({ text: fullText || preSits.join(", "), date: entryDate, situations: [], suggestions: genericSuggestions, contextLabel: null });
      }
      setPreEmos([]); setPreSits([]);

  // Select a suggested emotion and save
  const confirmWithEmotion = useCallback((emo) => {

  const del = useCallback((ts) => { if (readOnly) return; const u = entries.filter(e => e.ts !== ts); setEntries(u); save(u); }, [entries, readOnly, setEntries, save]);

  const stats = useMemo(() => {

    const freq = {};
    entries.flatMap(e => e.analysis.hits).forEach(h => { freq[h.label] = freq[h.label] || { count: 0, q: h.q }; freq[h.label].count++; });

    return { sorted, avgPos: entries.reduce((s, e) => s + e.analysis.posPct, 0) / entries.length, avgNeg: entries.reduce((s, e) => s + e.analysis.negPct, 0) / entries.length, total: entries.length };

  const tabS = (a) => ({ padding: "10px 16px", fontSize: 14, fontWeight: a ? 700 : 500, color: a ? "#0ea5e9" : "#1e293b", background: a ? "#e0f7fa" : "transparent", border: a ? "1px solid #b2ebf2" : "1px solid transparent", borderRadius: 10, cursor: "pointer", whiteSpace: "nowrap" });
  const tabs = readOnly
    ? [["change", "graph", "감정 분석하기"], ["detail", "treasure_map", "탐험일지 보기"]]
    : [["input", "pearl_shell", "감정 일기쓰기"], ["change", "graph", "감정 분석하기"], ["chat", "heart", "마음 대화하기"], ["game", "submarine", "탐험 연습하기"], ["detail", "treasure_map", "탐험일지 보기"]];

  var QUICK_EMOTIONS = [

    { name: "angry", label: "화남", icon: "😠" }, { name: "anxious", label: "불안", icon: "😰" },
    { name: "tired", label: "피곤", icon: "😴" }, { name: "joyful", label: "즐거움", icon: "😆" },
    { name: "grateful", label: "감사", icon: "🥰" }, { name: "annoyed", label: "짜증", icon: "😤" },
    { name: "afraid", label: "두려움", icon: "😨" }, { name: "calm", label: "편안", icon: "😌" },
    { name: "lonely", label: "외로움", icon: "🥺" }, { name: "excited", label: "신남", icon: "🤩" },
    { name: "proud", label: "뿌듯", icon: "💪" }, { name: "hopeful", label: "설렘", icon: "💕" },
  ];
  var QUICK_SITS = ["친구", "학교", "가족", "시험", "놀이", "혼남", "칭찬", "다툼", "발표", "운동"];

  const renderInput = () => (

                <button

              <div style={{ marginTop: 8, fontSize: 11, color: "#475569", lineHeight: 1.5 }}>
